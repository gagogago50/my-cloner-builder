# .github/workflows/grok-build-windows-amd64.yml

name: "Grok Build – Windows AMD64 + Security Scans"

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  GROK_DIR: "grok-build"
  PROTOC_VERSION: "29.3"
  # Cross-compilation target : Windows AMD64 via MinGW (depuis Linux)
  CARGO_TARGET: "x86_64-pc-windows-gnu"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 : BUILD WINDOWS AMD64 — CROSS-COMPILATION DEPUIS LINUX
  #
  # POURQUOI ubuntu-latest et non windows-latest ?
  #   Le build script xai-proto-build appelle :
  #     protoc --descriptor_set_out=/dev/stdout ...
  #   /dev/stdout est un pseudo-fichier Unix UNIQUEMENT.
  #   Sur Windows : "No such file or directory" → panic → exit 101.
  #   C'est une limite du code source (non patchable sans fork).
  #   Solution : build scripts tournent sur Linux (/dev/stdout ✅)
  #              binaire produit cible Windows AMD64 (.exe ✅)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows-amd64:
    name: "🏗️ Build – Windows AMD64 (cross depuis Linux)"
    runs-on: ubuntu-latest    # ← Linux : /dev/stdout existe, build scripts OK

    steps:
      - name: "📥 Checkout current repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 Clone xai-org/grok-build"
        run: |
          git clone --depth 1 https://github.com/xai-org/grok-build.git $GROK_DIR
          echo "=== Cloned files ==="
          ls -la $GROK_DIR

      # ── OUTILS CROSS-COMPILATION ──────────────────────────────────────────
      # mingw-w64 : toolchain GCC pour produire des .exe Windows depuis Linux
      # gcc-mingw-w64-x86-64 : compilateur C cross (requis par certaines crates)
      # binutils-mingw-w64-x86-64 : linker + outils binaires Windows
      - name: "🔧 Install MinGW-w64 cross-compilation toolchain"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            binutils-mingw-w64-x86-64 \
            mingw-w64-x86-64-dev
          echo "=== MinGW versions ==="
          x86_64-w64-mingw32-gcc --version
          x86_64-w64-mingw32-ld --version | head -1

      # ── PROTOC (version cohérente avec grok-build : 29.3) ─────────────────
      # arduino/setup-protoc fonctionne sur Linux aussi
      # protoc tourne sur Linux → /dev/stdout disponible ✅
      - name: "⚙️ Install protoc ${{ env.PROTOC_VERSION }}"
        uses: arduino/setup-protoc@v3
        with:
          version: "${{ env.PROTOC_VERSION }}"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔍 Capture protoc path"
        run: |
          PROTOC_PATH=$(which protoc)
          echo "✅ protoc at: $PROTOC_PATH"
          protoc --version
          echo "PROTOC=$PROTOC_PATH" >> "$GITHUB_ENV"

      # ── RUST + TARGET WINDOWS GNU ─────────────────────────────────────────
      # dtolnay/rust-toolchain lit rust-toolchain.toml automatiquement
      # On ajoute le target Windows GNU pour la cross-compilation
      - name: "🦀 Install Rust toolchain + target x86_64-pc-windows-gnu"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      # Vérifier que la toolchain épinglée dans grok-build est aussi installée
      - name: "🦀 Install grok-build pinned toolchain"
        run: |
          cd $GROK_DIR
          rustup show       # installe la toolchain depuis rust-toolchain.toml
          rustup target add x86_64-pc-windows-gnu
          echo "=== Rust ==="
          rustc --version ; cargo --version
          echo "=== Installed targets ==="
          rustup target list --installed

      - name: "💾 Cache Cargo registry & build artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ env.GROK_DIR }}/target/
          key: linux-cross-windows-gnu-${{ hashFiles(format('{0}/Cargo.lock', env.GROK_DIR)) }}
          restore-keys: |
            linux-cross-windows-gnu-

      # DotSlash pour les autres outils hermétiques sous bin/ (pas protoc)
      # Sur Linux, bin/protoc DotSlash fonctionnerait mais on préfère protoc système
      # pour la cohérence des versions et la rapidité
      - name: "🔧 Install DotSlash"
        run: |
          curl -sL https://github.com/facebook/dotslash/releases/latest/download/dotslash-ubuntu-22.04.tar.gz \
            | tar -xz -C /usr/local/bin
          dotslash --version

      - name: "🔍 Verify full environment before build"
        run: |
          echo "=== rustc ==="    ; rustc --version
          echo "=== cargo ==="    ; cargo --version
          echo "=== dotslash ===" ; dotslash --version
          echo "=== protoc ==="   ; protoc --version
          echo "=== PROTOC ==="   ; echo "PROTOC=$PROTOC"
          echo "=== MinGW GCC ===" ; x86_64-w64-mingw32-gcc --version | head -1
          echo "=== bin/ contents ==="
          ls -la $GROK_DIR/bin/

      # ── BUILD CROSS ────────────────────────────────────────────────────────
      # - Build scripts tournent sur Linux → /dev/stdout ✅
      # - Output : binaire .exe ciblant Windows AMD64
      # - CC et LINKER pointent vers MinGW pour la cross-compilation
      # - PROTOC : protoc Linux (exécuté pendant le build, pas dans le .exe)
      - name: "🏗️ cargo build --release (cross Linux → Windows AMD64)"
        working-directory: ${{ env.GROK_DIR }}
        run: |
          echo "Building for target: $CARGO_TARGET"
          echo "PROTOC=$PROTOC"

          cargo build \
            -p xai-grok-pager-bin \
            --release \
            --target "$CARGO_TARGET"
        env:
          PROTOC: ${{ env.PROTOC }}
          # Linker MinGW pour le target Windows GNU
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
          # Compilateur C cross pour les crates avec du code C (prost, etc.)
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc
          # AR cross
          AR_x86_64_pc_windows_gnu: x86_64-w64-mingw32-ar

      - name: "✅ Verify produced Windows binary"
        run: |
          RELEASE_DIR="$GROK_DIR/target/$CARGO_TARGET/release"
          echo "=== Contents of $RELEASE_DIR ==="
          ls -lh "$RELEASE_DIR"/*.exe 2>/dev/null || echo "No .exe found at top level"

          # Chercher le binaire principal (nommé xai-grok-pager selon le README)
          for name in xai-grok-pager xai-grok-pager-bin grok; do
            BIN="$RELEASE_DIR/${name}.exe"
            if [ -f "$BIN" ]; then
              SIZE=$(du -sh "$BIN" | cut -f1)
              echo "✅ Binary found: $BIN ($SIZE)"
              # Vérifier que c'est bien un PE (Windows executable)
              file "$BIN"
            fi
          done

          # Lister tous les .exe produits (hors build-scripts)
          echo "=== All produced .exe ==="
          find "$RELEASE_DIR" -maxdepth 1 -name "*.exe" \
            ! -name "build-script*" \
            -exec ls -lh {} \;

      - name: "📦 Upload Windows binary artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grok-build-windows-amd64
          # Les .exe sont dans target/x86_64-pc-windows-gnu/release/
          path: |
            ${{ env.GROK_DIR }}/target/${{ env.CARGO_TARGET }}/release/*.exe
          retention-days: 14
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : SEMGREP
  # ───────────────────────────────────────────────────────────────────────────
  semgrep:
    name: "🔎 Semgrep – Code Patterns & Injections"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🔎 Run Semgrep OSS (no API key)"
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --config "p/rust" \
            --sarif \
            --output semgrep.sarif \
            . grok-build \
            || true

          if ! python3 -c "import json; json.load(open('semgrep.sarif'))" 2>/dev/null; then
            printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' \
              > semgrep.sarif
          fi
          echo "✅ semgrep.sarif ($(wc -c < semgrep.sarif) bytes)"

      - name: "📤 Upload Semgrep SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : GUARDDOG
  # ───────────────────────────────────────────────────────────────────────────
  guarddog:
    name: "🐕 GuardDog – Malicious Package Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "🐕 Install GuardDog"
        run: pip install guarddog

      - name: "🔍 Scan PyPI dependencies"
        run: |
          FOUND=false
          for f in requirements*.txt requirements/*.txt \
                   grok-build/requirements*.txt grok-build/requirements/*.txt; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog pypi verify "$f" --output-format json \
              > "guarddog-pypi-$(basename "$f" .txt).json" 2>&1 || true
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun requirements.txt – scan PyPI ignoré"

      - name: "🔍 Scan npm dependencies"
        run: |
          FOUND=false
          for f in package.json grok-build/package.json; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog npm verify "$f" --output-format json \
              > "guarddog-npm-$(echo "$f" | tr '/' '-').json" 2>&1 || true
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun package.json – scan npm ignoré"

      - name: "📤 Upload GuardDog results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guarddog-results
          path: guarddog-*.json
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : OSSF SCORECARD
  # ───────────────────────────────────────────────────────────────────────────
  scorecard:
    name: "🏆 OSSF Scorecard – Repo Security Hygiene"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: "🏆 Run OSSF Scorecard"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: "📤 Upload Scorecard SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 : CODEQL – auto-détection des langages
  # ───────────────────────────────────────────────────────────────────────────
  codeql:
    name: "🧬 CodeQL – Auto-detect Languages"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🔍 Detect CodeQL-supported languages"
        id: detect-langs
        run: |
          LANGS=""
          if find . grok-build \
               \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) \
               -not -path "*/node_modules/*" 2>/dev/null | grep -q .; then
            LANGS="javascript-typescript"
          fi
          if find . grok-build -name "*.py" 2>/dev/null | grep -q .; then
            LANGS="${LANGS:+$LANGS,}python"
          fi
          if find . grok-build -name "*.go" 2>/dev/null | grep -q .; then
            LANGS="${LANGS:+$LANGS,}go"
          fi
          if [ -z "$LANGS" ]; then
            echo "ℹ️ Aucun langage CodeQL-compatible (repo Rust pur)"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "langs="     >> "$GITHUB_OUTPUT"
          else
            echo "✅ Langages : $LANGS"
            echo "skip=false"   >> "$GITHUB_OUTPUT"
            echo "langs=$LANGS" >> "$GITHUB_OUTPUT"
          fi

      - name: "🧬 Initialize CodeQL"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ steps.detect-langs.outputs.langs }}
          build-mode: none
          queries: security-extended,security-and-quality
        continue-on-error: true

      - name: "🔍 Perform CodeQL Analysis"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-auto
        continue-on-error: true

      - name: "ℹ️ CodeQL skipped (Rust-only)"
        if: steps.detect-langs.outputs.skip == 'true'
        run: |
          echo "## 🧬 CodeQL" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ Ignoré : projet 100% Rust — CodeQL ne supporte pas encore Rust." \
            >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 : GITLEAKS
  # ───────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: "🔑 Gitleaks – Secrets Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: "📤 Upload Gitleaks report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 7 : BEARER
  # ───────────────────────────────────────────────────────────────────────────
  bearer:
    name: "🛡️ Bearer – SAST & Secrets"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🛡️ Install Bearer CLI"
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/Bearer/bearer/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          bearer version

      - name: "🛡️ Run Bearer scan"
        run: |
          bearer scan . grok-build \
            --format sarif \
            --output bearer-raw.sarif \
            --severity critical,high,medium \
            --scanner secrets \
            --quiet \
            || true

      - name: "🔧 Sanitize Bearer SARIF (null → [])"
        run: |
          cat > /tmp/fix_sarif.py << 'PYEOF'
          import json, os, sys

          SKELETON = {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {"driver": {"name": "Bearer", "version": "2.x", "rules": []}},
              "results": [],
              "artifacts": []
            }]
          }

          raw = "bearer-raw.sarif"
          out = "bearer.sarif"

          if not os.path.exists(raw):
            print("WARNING: bearer-raw.sarif absent -> squelette vide")
            json.dump(SKELETON, open(out, "w"), indent=2)
            sys.exit(0)

          try:
            data = json.load(open(raw))
          except json.JSONDecodeError as e:
            print(f"WARNING: JSON invalide ({e}) -> squelette vide")
            json.dump(SKELETON, open(out, "w"), indent=2)
            sys.exit(0)

          for run in data.get("runs", []):
            if not isinstance(run.get("results"),   list): run["results"]   = []
            if not isinstance(run.get("artifacts"), list): run["artifacts"] = []
            drv = run.get("tool", {}).get("driver", {})
            if not isinstance(drv.get("rules"), list):     drv["rules"]     = []

          json.dump(data, open(out, "w"), indent=2)

          check = json.load(open(out))
          for i, r in enumerate(check.get("runs", [])):
            assert isinstance(r["results"], list), f"run[{i}].results pas une liste!"
          print(f"OK: bearer.sarif valide — {len(check['runs'])} run(s)")
          PYEOF
          python3 /tmp/fix_sarif.py

      - name: "📤 Upload Bearer SARIF to GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bearer.sarif
          category: bearer
        continue-on-error: true

      - name: "📤 Upload Bearer SARIF artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bearer-report
          path: bearer.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB FINAL : SUMMARY
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "📋 Security & Build Summary"
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
      - semgrep
      - guarddog
      - scorecard
      - codeql
      - gitleaks
      - bearer
    if: always()

    steps:
      - name: "📋 Write Job Summary"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🔒 Grok Build – Security & Build Report

          | Job | Statut |
          |-----|--------|
          | 🏗️ Build Windows AMD64 | ${{ needs.build-windows-amd64.result }} |
          | 🔎 Semgrep             | ${{ needs.semgrep.result }} |
          | 🐕 GuardDog           | ${{ needs.guarddog.result }} |
          | 🏆 OSSF Scorecard     | ${{ needs.scorecard.result }} |
          | 🧬 CodeQL             | ${{ needs.codeql.result }} |
          | 🔑 Gitleaks           | ${{ needs.gitleaks.result }} |
          | 🛡️ Bearer              | ${{ needs.bearer.result }} |

          > 🔍 Résultats dans **Security > Code scanning**.
          > 📦 Binaire Windows (.exe) dans les **Artifacts** de ce run.
          > 🐧 Build cross-compilé depuis Linux → target Windows AMD64 GNU.
          > ℹ️ CodeQL ignoré si aucun langage supporté détecté (repo Rust pur).
          EOF
