# .github/workflows/grok-build-windows-amd64.yml
#
# Workflow: Build grok-build (Windows AMD64) + Security Scans (parallel)
#
# Secrets requis : AUCUN — GITHUB_TOKEN automatique suffit pour tout
#
# Architecture jobs (tous lancés en parallèle dès le déclenchement) :
#
#  ┌─────────────────────────────────────────────────────────────────┐
#  │  PARALLÈLE                                                      │
#  │  ┌──────────────────┐  ┌──────────┐  ┌──────────┐             │
#  │  │build-windows-amd │  │ semgrep  │  │ guarddog │             │
#  │  └──────────────────┘  └──────────┘  └──────────┘             │
#  │  ┌──────────┐  ┌──────────┐  ┌──────────┐  ┌──────────┐      │
#  │  │scorecard │  │  codeql  │  │ gitleaks │  │  bearer  │      │
#  │  └──────────┘  └──────────┘  └──────────┘  └──────────┘      │
#  └─────────────────────────────────────────────────────────────────┘
#                              │
#                         ┌────▼─────┐
#                         │ summary  │ (if: always())
#                         └──────────┘

name: "Grok Build – Windows AMD64 + Security Scans"

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 : BUILD WINDOWS AMD64
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows-amd64:
    name: "🏗️ Build – Windows AMD64 (Rust)"
    runs-on: windows-latest

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # dtolnay/rust-toolchain lit automatiquement rust-toolchain.toml
      # On n'épingle pas de version : le fichier du repo fait foi
      - name: "🦀 Install Rust toolchain (from rust-toolchain.toml)"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: "💾 Cache Cargo registry & build artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-amd64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-amd64-cargo-

      # ── FIX #1 : Utiliser l'action officielle facebook/install-dotslash ──
      # Elle détecte Windows et télécharge dotslash.exe depuis GitHub Releases
      # cargo install dotslash ne fonctionne PAS (pas publié sur crates.io)
      - name: "🔧 Install DotSlash (official action)"
        uses: facebook/install-dotslash@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔍 Verify environment"
        shell: pwsh
        run: |
          Write-Host "=== Rust ==="
          rustc --version
          cargo --version
          Write-Host "=== DotSlash ==="
          dotslash --version
          Write-Host "=== Rustup targets ==="
          rustup target list --installed

      - name: "🏗️ cargo build --release (xai-grok-pager-bin, Windows AMD64)"
        shell: pwsh
        run: |
          cargo build `
            -p xai-grok-pager-bin `
            --release `
            --target x86_64-pc-windows-msvc

      - name: "✅ Verify produced binary"
        shell: pwsh
        run: |
          $releaseDir = "target\x86_64-pc-windows-msvc\release"
          $bin = "$releaseDir\xai-grok-pager-bin.exe"
          if (Test-Path $bin) {
            $size = [math]::Round((Get-Item $bin).Length / 1MB, 2)
            Write-Host "✅ Binary found: $bin ($size MB)"
          } else {
            Write-Host "⚠️  xai-grok-pager-bin.exe not found, listing release dir..."
            Get-ChildItem $releaseDir -Filter "*.exe" |
              Where-Object { $_.Name -notmatch "^(build-script|\.)" } |
              ForEach-Object { Write-Host "  Found: $_" }
          }

      - name: "📦 Upload Windows binary artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grok-build-windows-amd64
          path: target/x86_64-pc-windows-msvc/release/*.exe
          retention-days: 14
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : SEMGREP
  # ───────────────────────────────────────────────────────────────────────────
  semgrep:
    name: "🔎 Semgrep – Code Patterns & Injections"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔎 Run Semgrep (OSS – no API key)"
        # Sans SEMGREP_APP_TOKEN → mode OSS pur, gratuit, sans limite
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --config "p/rust" \
            --sarif \
            --output semgrep.sarif \
            || true
          # Vérification que le fichier SARIF existe et est non-vide
          if [ -f semgrep.sarif ] && [ -s semgrep.sarif ]; then
            echo "✅ semgrep.sarif generated ($(wc -c < semgrep.sarif) bytes)"
          else
            echo "⚠️ No findings or SARIF empty, creating minimal valid SARIF..."
            cat > semgrep.sarif << 'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{"tool": {"driver": {"name": "Semgrep","rules": []}},"results": []}]
          }
          EOF
          fi

      - name: "📤 Upload Semgrep SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : GUARDDOG
  # ───────────────────────────────────────────────────────────────────────────
  guarddog:
    name: "🐕 GuardDog – Malicious Package Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "🐕 Install GuardDog"
        run: pip install guarddog

      - name: "🔍 Scan PyPI dependencies"
        run: |
          FOUND=false
          for f in requirements*.txt requirements/*.txt; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog pypi verify "$f" --output-format json \
              > "guarddog-pypi-$(basename "$f" .txt).json" 2>&1 || true
            cat "guarddog-pypi-$(basename "$f" .txt).json"
          done
          [ "$FOUND" = true ] || echo "ℹ️ No requirements.txt – PyPI scan skipped"

      - name: "🔍 Scan npm dependencies"
        run: |
          if [ -f "package.json" ]; then
            echo "=== Scanning npm ==="
            guarddog npm verify package.json --output-format json \
              > guarddog-npm.json 2>&1 || true
            cat guarddog-npm.json
          else
            echo "ℹ️ No package.json – npm scan skipped"
          fi

      - name: "📤 Upload GuardDog results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guarddog-results
          path: guarddog-*.json
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : OSSF SCORECARD
  # ───────────────────────────────────────────────────────────────────────────
  scorecard:
    name: "🏆 OSSF Scorecard – Repo Security Hygiene"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: "🏆 Run OSSF Scorecard"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: "📤 Upload Scorecard SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 : CODEQL
  # FIX #3 : queries sur une seule ligne (virgule), pas de bloc multiline
  # FIX #4 : codeql-action@v4 (v3 deprecated)
  # FIX #5 : build-mode: none (évite l'autobuild qui échoue sur un repo Rust)
  # ───────────────────────────────────────────────────────────────────────────
  codeql:
    name: "🧬 CodeQL – ${{ matrix.language }}"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # build-mode: none = pas de compilation requise (langages interprétés)
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # FIX #3 : queries en ligne, séparés par virgule — PAS de bloc multiline
      # FIX #4 : @v4
      - name: "🧬 Initialize CodeQL (${{ matrix.language }})"
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
        continue-on-error: true

      - name: "🔍 Perform CodeQL Analysis"
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-${{ matrix.language }}
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 : GITLEAKS
  # ───────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: "🔑 Gitleaks – Secrets Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # OBLIGATOIRE : Gitleaks scanne tout l'historique

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pas de GITLEAKS_LICENSE requis pour repo public
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: "📤 Upload Gitleaks report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 7 : BEARER
  # FIX #1 : supprimer les paramètres invalides (exit-code, scanner)
  # FIX #2 : laisser Bearer gérer lui-même le SARIF via format+output natifs
  # Le SARIF Bearer est uploadé via une étape séparée (pattern officiel)
  # ───────────────────────────────────────────────────────────────────────────
  bearer:
    name: "🛡️ Bearer – SAST & Data Security"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FIX : format + output sont les seuls inputs SARIF supportés
      # exit-code et scanner ne sont PAS des inputs valides de bearer-action@v2
      - name: "🛡️ Run Bearer SAST (SARIF output)"
        id: bearer
        uses: bearer/bearer-action@v2
        with:
          format: sarif
          output: bearer.sarif
          severity: "critical,high,medium"
        # Ne pas bloquer le workflow si Bearer trouve des issues
        continue-on-error: true

      # Vérifier que le SARIF est valide avant upload
      - name: "🔍 Validate Bearer SARIF"
        if: always()
        run: |
          if [ -f bearer.sarif ]; then
            # Tester que c'est du JSON valide
            python3 -c "
          import json, sys
          try:
              data = json.load(open('bearer.sarif'))
              print(f'✅ Valid SARIF: {len(data.get(\"runs\", []))} run(s)')
          except json.JSONDecodeError as e:
              print(f'❌ Invalid JSON: {e}')
              # Créer un SARIF vide valide en fallback
              fallback = {
                  '\$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
                  'version': '2.1.0',
                  'runs': [{'tool': {'driver': {'name': 'Bearer', 'rules': []}}, 'results': []}]
              }
              json.dump(fallback, open('bearer.sarif', 'w'))
              print('↩️  Replaced with valid empty SARIF')
          "
          else
            echo "⚠️ bearer.sarif not found, creating empty SARIF..."
            cat > bearer.sarif << 'SARIF'
          {"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Bearer","rules":[]}},"results":[]}]}
          SARIF
          fi

      - name: "📤 Upload Bearer SARIF to GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bearer.sarif
          category: bearer
        continue-on-error: true

      - name: "📤 Upload Bearer SARIF artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bearer-report
          path: bearer.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB FINAL : SUMMARY
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "📋 Security & Build Summary"
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
      - semgrep
      - guarddog
      - scorecard
      - codeql
      - gitleaks
      - bearer
    if: always()

    steps:
      - name: "📋 Write Job Summary"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🔒 Grok Build – Security & Build Report

          | Job | Status |
          |-----|--------|
          | 🏗️ Build Windows AMD64 | ${{ needs.build-windows-amd64.result }} |
          | 🔎 Semgrep             | ${{ needs.semgrep.result }} |
          | 🐕 GuardDog           | ${{ needs.guarddog.result }} |
          | 🏆 OSSF Scorecard     | ${{ needs.scorecard.result }} |
          | 🧬 CodeQL             | ${{ needs.codeql.result }} |
          | 🔑 Gitleaks           | ${{ needs.gitleaks.result }} |
          | 🛡️ Bearer              | ${{ needs.bearer.result }} |

          > 🔍 Résultats détaillés disponibles dans l'onglet **Security > Code scanning**.
          > 📦 Binaire Windows disponible dans les **Artifacts** de ce run.
          EOF
