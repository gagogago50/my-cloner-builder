# .github/workflows/grok-build-windows-amd64.yml

name: "Grok Build – Windows AMD64 + Security Scans"

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  # Répertoire où grok-build sera cloné dans le job build
  GROK_DIR: "grok-build"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 : BUILD WINDOWS AMD64
# FIX #1 : clone xai-org/grok-build avant de builder
#           (ce workflow tourne dans my-cloner-builder, pas dans grok-build)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows-amd64:
    name: "🏗️ Build – Windows AMD64 (Rust)"
    runs-on: windows-latest

    steps:
      # On checkout quand même le repo courant (pour les métadonnées GitHub)
      - name: "📥 Checkout current repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # FIX #1 — Cloner grok-build dans un sous-dossier
      - name: "📥 Clone xai-org/grok-build"
        shell: pwsh
        run: |
          Write-Host "Cloning xai-org/grok-build..."
          git clone --depth 1 https://github.com/xai-org/grok-build.git $env:GROK_DIR
          Write-Host "Contents of $env:GROK_DIR :"
          Get-ChildItem $env:GROK_DIR | Select-Object Name

      # dtolnay/rust-toolchain lit rust-toolchain.toml depuis le CWD
      # On lui indique le chemin explicitement via working-directory n'est pas
      # un input supporté → on se déplace avec shell avant
      - name: "🦀 Install Rust toolchain (from grok-build/rust-toolchain.toml)"
        shell: pwsh
        run: |
          # Lire la toolchain depuis le fichier du projet cloné
          $toolchainFile = "$env:GROK_DIR\rust-toolchain.toml"
          if (Test-Path $toolchainFile) {
            Write-Host "Found rust-toolchain.toml:"
            Get-Content $toolchainFile
          }
          # rustup lira automatiquement rust-toolchain.toml quand on sera dans le dossier
          Set-Location $env:GROK_DIR
          rustup show         # Installe la toolchain épinglée automatiquement
          rustup target add x86_64-pc-windows-msvc
          rustc --version
          cargo --version

      - name: "💾 Cache Cargo registry"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ env.GROK_DIR }}/target/
          key: windows-amd64-cargo-${{ hashFiles(format('{0}/Cargo.lock', env.GROK_DIR)) }}
          restore-keys: |
            windows-amd64-cargo-

      # FIX : action officielle — télécharge le binaire précompilé depuis Releases
      - name: "🔧 Install DotSlash (official action)"
        uses: facebook/install-dotslash@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔍 Verify environment"
        shell: pwsh
        run: |
          Write-Host "=== Rust ===" ; rustc --version ; cargo --version
          Write-Host "=== DotSlash ===" ; dotslash --version
          Write-Host "=== Working dir ===" ; Get-Location
          Write-Host "=== grok-build Cargo.toml present ==="
          Test-Path "$env:GROK_DIR\Cargo.toml"

      # FIX #1 — working-directory pointe vers le clone de grok-build
      - name: "🏗️ cargo build --release (xai-grok-pager-bin)"
        shell: pwsh
        working-directory: ${{ env.GROK_DIR }}
        run: |
          cargo build `
            -p xai-grok-pager-bin `
            --release `
            --target x86_64-pc-windows-msvc

      - name: "✅ Verify produced binary"
        shell: pwsh
        run: |
          $releaseDir = "$env:GROK_DIR\target\x86_64-pc-windows-msvc\release"
          $bin = "$releaseDir\xai-grok-pager-bin.exe"
          if (Test-Path $bin) {
            $size = [math]::Round((Get-Item $bin).Length / 1MB, 2)
            Write-Host "✅ Binary: $bin ($size MB)"
          } else {
            Write-Host "⚠️ xai-grok-pager-bin.exe not found – listing $releaseDir"
            Get-ChildItem $releaseDir -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch "build-script" } |
              ForEach-Object { Write-Host "  Found: $_" }
          }

      - name: "📦 Upload Windows binary artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grok-build-windows-amd64
          path: ${{ env.GROK_DIR }}/target/x86_64-pc-windows-msvc/release/*.exe
          retention-days: 14
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : SEMGREP
  # Scanne le repo courant (workflow files, scripts, etc.)
  # ───────────────────────────────────────────────────────────────────────────
  semgrep:
    name: "🔎 Semgrep – Code Patterns & Injections"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build for Rust analysis"
        run: |
          git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🔎 Run Semgrep OSS (no API key)"
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --config "p/rust" \
            --sarif \
            --output semgrep.sarif \
            . grok-build \
            || true

          # Garantir un SARIF valide même si scan vide
          if ! python3 -c "import json; json.load(open('semgrep.sarif'))" 2>/dev/null; then
            echo "⚠️ SARIF invalide ou absent → génération fallback"
            cat > semgrep.sarif << 'EOF'
          {"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}
          EOF
          fi
          echo "✅ semgrep.sarif OK ($(wc -c < semgrep.sarif) bytes)"

      - name: "📤 Upload Semgrep SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : GUARDDOG
  # ───────────────────────────────────────────────────────────────────────────
  guarddog:
    name: "🐕 GuardDog – Malicious Package Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "🐕 Install GuardDog"
        run: pip install guarddog

      - name: "🔍 Scan PyPI dependencies"
        run: |
          FOUND=false
          # Chercher dans les deux repos
          for f in requirements*.txt requirements/*.txt \
                   grok-build/requirements*.txt grok-build/requirements/*.txt; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog pypi verify "$f" --output-format json \
              > "guarddog-pypi-$(basename "$f" .txt).json" 2>&1 || true
            cat "guarddog-pypi-$(basename "$f" .txt).json"
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun requirements.txt trouvé – scan PyPI ignoré"

      - name: "🔍 Scan npm dependencies"
        run: |
          FOUND=false
          for f in package.json grok-build/package.json; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog npm verify "$f" --output-format json \
              > "guarddog-npm-$(dirname "$f" | tr '/' '-').json" 2>&1 || true
            cat "guarddog-npm-$(dirname "$f" | tr '/' '-').json"
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun package.json trouvé – scan npm ignoré"

      - name: "📤 Upload GuardDog results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guarddog-results
          path: guarddog-*.json
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : OSSF SCORECARD
  # ───────────────────────────────────────────────────────────────────────────
  scorecard:
    name: "🏆 OSSF Scorecard – Repo Security Hygiene"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: "🏆 Run OSSF Scorecard"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: "📤 Upload Scorecard SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 : CODEQL
  # FIX #2 : suppression de la matrix JS/Python (grok-build = 100% Rust)
  #           CodeQL ne supporte pas Rust → on utilise l'auto-détection
  #           Si aucun langage supporté n'est trouvé, le job se termine proprement
  # ───────────────────────────────────────────────────────────────────────────
  codeql:
    name: "🧬 CodeQL – Auto-detect Languages"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      # FIX #2 : Détecter les langages présents AVANT d'initialiser CodeQL
      # CodeQL supporte : cpp, csharp, go, java, javascript, python, ruby, swift
      # Rust N'EST PAS supporté → on détecte ce qui est réellement présent
      - name: "🔍 Detect CodeQL-supported languages"
        id: detect-langs
        run: |
          LANGS=""
          # JavaScript/TypeScript
          if find . grok-build -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \
               2>/dev/null | grep -qv "node_modules"; then
            LANGS="javascript-typescript"
          fi
          # Python
          if find . grok-build -name "*.py" 2>/dev/null | grep -q .; then
            LANGS="$LANGS,python"
          fi
          # Go
          if find . grok-build -name "*.go" 2>/dev/null | grep -q .; then
            LANGS="$LANGS,go"
          fi
          # Nettoyage de la virgule de début si LANGS commence par ","
          LANGS="${LANGS#,}"

          if [ -z "$LANGS" ]; then
            echo "ℹ️ Aucun langage CodeQL-compatible détecté (repo 100% Rust)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "langs=" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Langages détectés : $LANGS"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "langs=$LANGS" >> "$GITHUB_OUTPUT"
          fi

      - name: "🧬 Initialize CodeQL"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ steps.detect-langs.outputs.langs }}
          build-mode: none
          queries: security-extended,security-and-quality
        continue-on-error: true

      - name: "🔍 Perform CodeQL Analysis"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-auto
        continue-on-error: true

      - name: "ℹ️ CodeQL skipped (Rust-only repo)"
        if: steps.detect-langs.outputs.skip == 'true'
        run: |
          echo "## 🧬 CodeQL" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ Ignoré : grok-build est un projet Rust pur." >> "$GITHUB_STEP_SUMMARY"
          echo "CodeQL ne supporte pas encore Rust officiellement." >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 : GITLEAKS
  # ───────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: "🔑 Gitleaks – Secrets Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout (full history – obligatoire pour Gitleaks)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: "📤 Upload Gitleaks report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 7 : BEARER
  # FIX #3 : appel CLI direct (curl install) au lieu de bearer/bearer-action@v2
  #           → contrôle total du exit code via || true
  #           → garantit la génération du SARIF même sur repo Rust
  #           → Bearer scanne quand même les secrets (agnostique au langage)
  # ───────────────────────────────────────────────────────────────────────────
  bearer:
    name: "🛡️ Bearer – SAST & Secrets"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      # FIX #3 : installation CLI directe depuis le script officiel
      - name: "🛡️ Install Bearer CLI"
        run: |
          curl -sfL https://raw.githubusercontent.com/Bearer/bearer/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          bearer version

      # FIX #3 : || true garantit que le job ne fail pas si Bearer trouve des issues
      # --scanner secrets  → fonctionne sur n'importe quel langage (Rust inclus)
      # --scanner sast     → tenté, ignoré gracieusement si langage non supporté
      - name: "🛡️ Run Bearer scan"
        run: |
          bearer scan . grok-build \
            --format sarif \
            --output bearer.sarif \
            --severity critical,high,medium \
            --scanner secrets \
            --quiet \
            || true

          # Valider le JSON SARIF — fallback si invalide ou absent
          if python3 -c "import json; json.load(open('bearer.sarif'))" 2>/dev/null; then
            echo "✅ bearer.sarif valide ($(wc -c < bearer.sarif) bytes)"
          else
            echo "⚠️ bearer.sarif absent ou invalide → génération fallback SARIF"
            cat > bearer.sarif << 'EOF'
          {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {"driver": {"name": "Bearer", "version": "2.x", "rules": []}},
              "results": []
            }]
          }
          EOF
          fi

      - name: "📤 Upload Bearer SARIF to GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bearer.sarif
          category: bearer
        continue-on-error: true

      - name: "📤 Upload Bearer SARIF artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bearer-report
          path: bearer.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB FINAL : SUMMARY
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "📋 Security & Build Summary"
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
      - semgrep
      - guarddog
      - scorecard
      - codeql
      - gitleaks
      - bearer
    if: always()

    steps:
      - name: "📋 Write Job Summary"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🔒 Grok Build – Security & Build Report

          | Job | Statut |
          |-----|--------|
          | 🏗️ Build Windows AMD64 | ${{ needs.build-windows-amd64.result }} |
          | 🔎 Semgrep             | ${{ needs.semgrep.result }} |
          | 🐕 GuardDog           | ${{ needs.guarddog.result }} |
          | 🏆 OSSF Scorecard     | ${{ needs.scorecard.result }} |
          | 🧬 CodeQL             | ${{ needs.codeql.result }} |
          | 🔑 Gitleaks           | ${{ needs.gitleaks.result }} |
          | 🛡️ Bearer              | ${{ needs.bearer.result }} |

          > 🔍 Résultats dans **Security > Code scanning** (SARIF uploadés).
          > 📦 Binaire Windows dans les **Artifacts** de ce run.
          > ℹ️ CodeQL ignoré si 0 langage supporté détecté (repo Rust pur).
          EOF
