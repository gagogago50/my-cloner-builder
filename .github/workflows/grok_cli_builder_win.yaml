# .github/workflows/grok-build-windows-amd64.yml

name: "Grok Build – Windows AMD64 + Security Scans"

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  GROK_DIR: "grok-build"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 : BUILD WINDOWS AMD64
  # FIX PROTOC : arduino/setup-protoc installe protoc natif Windows
  #              + PROTOC env var → bypasse totalement DotSlash pour protoc
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows-amd64:
    name: "🏗️ Build – Windows AMD64 (Rust)"
    runs-on: windows-latest

    steps:
      - name: "📥 Checkout current repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 Clone xai-org/grok-build"
        shell: pwsh
        run: |
          Write-Host "Cloning xai-org/grok-build..."
          git clone --depth 1 https://github.com/xai-org/grok-build.git $env:GROK_DIR
          Write-Host "=== Contents ==="
          Get-ChildItem $env:GROK_DIR | Select-Object -ExpandProperty Name

      # ── FIX PROTOC ────────────────────────────────────────────────────────
      # arduino/setup-protoc installe protoc précompilé pour Windows x64
      # et l'ajoute au PATH + expose $PROTOC automatiquement
      # Le build script xai_proto_build lit $PROTOC en priorité absolue
      # → plus besoin de DotSlash pour protoc
      - name: "⚙️ Install protoc (bypass DotSlash on Windows)"
        uses: arduino/setup-protoc@v3
        with:
          version: "25.x"   # Dernière version stable protobuf
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # include-pre-releases: false (défaut)

      # Vérifier que protoc est bien dans PATH et accessible
      - name: "🔍 Verify protoc installation"
        shell: pwsh
        run: |
          $protocPath = (Get-Command protoc -ErrorAction Stop).Source
          Write-Host "✅ protoc found at: $protocPath"
          protoc --version
          # Exporter PROTOC explicitement pour les steps suivants
          echo "PROTOC=$protocPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # DotSlash reste installé pour les AUTRES outils hermétiques sous bin/
      # (pas pour bin/protoc qui est bypassé via PROTOC env var)
      - name: "🔧 Install DotSlash (pour outils hermétiques bin/*)"
        uses: facebook/install-dotslash@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🦀 Install Rust toolchain (depuis grok-build/rust-toolchain.toml)"
        shell: pwsh
        run: |
          Set-Location $env:GROK_DIR
          # rustup lit automatiquement rust-toolchain.toml dans le CWD
          rustup show
          rustup target add x86_64-pc-windows-msvc
          Write-Host "=== Rust ===" ; rustc --version ; cargo --version

      - name: "💾 Cache Cargo registry & build artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ env.GROK_DIR }}/target/
          key: windows-amd64-cargo-${{ hashFiles(format('{0}/Cargo.lock', env.GROK_DIR)) }}
          restore-keys: |
            windows-amd64-cargo-

      - name: "🔍 Verify full environment"
        shell: pwsh
        run: |
          Write-Host "=== rustc ===" ; rustc --version
          Write-Host "=== cargo ===" ; cargo --version
          Write-Host "=== dotslash ===" ; dotslash --version
          Write-Host "=== protoc ===" ; protoc --version
          Write-Host "=== PROTOC env ===" ; Write-Host $env:PROTOC
          Write-Host "=== Cargo.toml present ===" ; Test-Path "$env:GROK_DIR\Cargo.toml"

      # PROTOC est dans l'env GitHub → le build script le trouvera directement
      - name: "🏗️ cargo build --release (xai-grok-pager-bin)"
        shell: pwsh
        working-directory: ${{ env.GROK_DIR }}
        run: |
          cargo build `
            -p xai-grok-pager-bin `
            --release `
            --target x86_64-pc-windows-msvc
        env:
          # PROTOC est déjà dans GITHUB_ENV, on le redéclare explicitement
          # pour être certain que le build script Rust le voit
          PROTOC: ${{ env.PROTOC }}

      - name: "✅ Verify produced binary"
        shell: pwsh
        run: |
          $releaseDir = "$env:GROK_DIR\target\x86_64-pc-windows-msvc\release"
          # Le binaire s'appelle xai-grok-pager (sans -bin) selon le README
          $candidates = @(
            "$releaseDir\xai-grok-pager.exe",
            "$releaseDir\xai-grok-pager-bin.exe",
            "$releaseDir\grok.exe"
          )
          $found = $false
          foreach ($bin in $candidates) {
            if (Test-Path $bin) {
              $size = [math]::Round((Get-Item $bin).Length / 1MB, 2)
              Write-Host "✅ Binary: $bin ($size MB)"
              $found = $true
            }
          }
          if (-not $found) {
            Write-Host "⚠️ Binaires attendus non trouvés, listing du dossier release:"
            Get-ChildItem $releaseDir -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch "build-script" } |
              ForEach-Object { Write-Host "  Found: $($_.FullName)" }
          }

      - name: "📦 Upload Windows binary artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grok-build-windows-amd64
          path: ${{ env.GROK_DIR }}/target/x86_64-pc-windows-msvc/release/*.exe
          retention-days: 14
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : SEMGREP
  # ───────────────────────────────────────────────────────────────────────────
  semgrep:
    name: "🔎 Semgrep – Code Patterns & Injections"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🔎 Run Semgrep OSS (no API key)"
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --config "p/rust" \
            --sarif \
            --output semgrep.sarif \
            . grok-build \
            || true

          # Garantir un SARIF JSON valide
          if ! python3 -c "import json; json.load(open('semgrep.sarif'))" 2>/dev/null; then
            echo "⚠️ SARIF invalide → fallback"
            printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' \
              > semgrep.sarif
          fi
          echo "✅ semgrep.sarif ($(wc -c < semgrep.sarif) bytes)"

      - name: "📤 Upload Semgrep SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : GUARDDOG
  # ───────────────────────────────────────────────────────────────────────────
  guarddog:
    name: "🐕 GuardDog – Malicious Package Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "🐕 Install GuardDog"
        run: pip install guarddog

      - name: "🔍 Scan PyPI dependencies"
        run: |
          FOUND=false
          for f in requirements*.txt requirements/*.txt \
                   grok-build/requirements*.txt grok-build/requirements/*.txt; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog pypi verify "$f" --output-format json \
              > "guarddog-pypi-$(basename "$f" .txt).json" 2>&1 || true
            cat "guarddog-pypi-$(basename "$f" .txt).json"
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun requirements.txt – scan PyPI ignoré"

      - name: "🔍 Scan npm dependencies"
        run: |
          FOUND=false
          for f in package.json grok-build/package.json; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog npm verify "$f" --output-format json \
              > "guarddog-npm-$(echo "$f" | tr '/' '-').json" 2>&1 || true
            cat "guarddog-npm-$(echo "$f" | tr '/' '-').json"
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun package.json – scan npm ignoré"

      - name: "📤 Upload GuardDog results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guarddog-results
          path: guarddog-*.json
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : OSSF SCORECARD
  # ───────────────────────────────────────────────────────────────────────────
  scorecard:
    name: "🏆 OSSF Scorecard – Repo Security Hygiene"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: "🏆 Run OSSF Scorecard"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: "📤 Upload Scorecard SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 : CODEQL – auto-détection des langages
  # ───────────────────────────────────────────────────────────────────────────
  codeql:
    name: "🧬 CodeQL – Auto-detect Languages"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🔍 Detect CodeQL-supported languages"
        id: detect-langs
        run: |
          LANGS=""
          if find . grok-build \
               \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) \
               -not -path "*/node_modules/*" 2>/dev/null | grep -q .; then
            LANGS="javascript-typescript"
          fi
          if find . grok-build -name "*.py" 2>/dev/null | grep -q .; then
            LANGS="${LANGS:+$LANGS,}python"
          fi
          if find . grok-build -name "*.go" 2>/dev/null | grep -q .; then
            LANGS="${LANGS:+$LANGS,}go"
          fi
          if [ -z "$LANGS" ]; then
            echo "ℹ️ Aucun langage CodeQL-compatible (repo Rust pur)"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "langs="     >> "$GITHUB_OUTPUT"
          else
            echo "✅ Langages : $LANGS"
            echo "skip=false"    >> "$GITHUB_OUTPUT"
            echo "langs=$LANGS"  >> "$GITHUB_OUTPUT"
          fi

      - name: "🧬 Initialize CodeQL"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ steps.detect-langs.outputs.langs }}
          build-mode: none
          queries: security-extended,security-and-quality
        continue-on-error: true

      - name: "🔍 Perform CodeQL Analysis"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-auto
        continue-on-error: true

      - name: "ℹ️ CodeQL skipped (Rust-only)"
        if: steps.detect-langs.outputs.skip == 'true'
        run: |
          echo "## 🧬 CodeQL" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ Ignoré : projet 100% Rust — CodeQL ne supporte pas encore Rust." \
            >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 : GITLEAKS
  # ───────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: "🔑 Gitleaks – Secrets Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: "📤 Upload Gitleaks report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 7 : BEARER
  # FIX SARIF : patcher runs[].results null → [] avec Python avant upload
  # ───────────────────────────────────────────────────────────────────────────
  bearer:
    name: "🛡️ Bearer – SAST & Secrets"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🛡️ Install Bearer CLI"
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/Bearer/bearer/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          bearer version

      # --scanner secrets fonctionne sur tout langage (agnostique)
      # || true : ne jamais bloquer même si Bearer trouve des issues
      - name: "🛡️ Run Bearer scan"
        run: |
          bearer scan . grok-build \
            --format sarif \
            --output bearer-raw.sarif \
            --severity critical,high,medium \
            --scanner secrets \
            --quiet \
            || true

      # FIX SARIF : patch complet en Python
      # Problème : Bearer génère parfois "results": null au lieu de "results": []
      # GitHub SARIF validator rejette null → on normalise TOUS les champs critiques
      - name: "🔧 Sanitize Bearer SARIF (null → [])"
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          SARIF_SKELETON = {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {"driver": {"name": "Bearer", "version": "2.x", "rules": []}},
              "results": []
            }]
          }

          raw_path = "bearer-raw.sarif"
          out_path = "bearer.sarif"

          # Cas 1 : fichier absent
          if not os.path.exists(raw_path):
            print("⚠️  bearer-raw.sarif absent → écriture du squelette vide")
            with open(out_path, "w") as f:
              json.dump(SARIF_SKELETON, f, indent=2)
            sys.exit(0)

          # Cas 2 : fichier présent, tenter de parser
          try:
            with open(raw_path) as f:
              data = json.load(f)
          except json.JSONDecodeError as e:
            print(f"⚠️  JSON invalide ({e}) → écriture du squelette vide")
            with open(out_path, "w") as f:
              json.dump(SARIF_SKELETON, f, indent=2)
            sys.exit(0)

          # Cas 3 : JSON valide — patch de chaque run
          patched = 0
          for run in data.get("runs", []):
            # results null ou absent → []
            if not isinstance(run.get("results"), list):
              run["results"] = []
              patched += 1
            # artifacts null ou absent → []
            if not isinstance(run.get("artifacts"), list):
              run["artifacts"] = []
            # tool.driver.rules null → []
            driver = run.get("tool", {}).get("driver", {})
            if not isinstance(driver.get("rules"), list):
              driver["rules"] = []

          print(f"✅ SARIF patché : {patched} run(s) corrigés, "
                f"{len(data.get('runs', []))} run(s) total")

          with open(out_path, "w") as f:
            json.dump(data, f, indent=2)

          # Vérification finale
          with open(out_path) as f:
            check = json.load(f)
          for i, r in enumerate(check.get("runs", [])):
            assert isinstance(r["results"], list), \
              f"run[{i}].results toujours pas une liste!"
          print(f"✅ Validation finale OK — bearer.sarif prêt pour upload")
          PYEOF

      - name: "📤 Upload Bearer SARIF to GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bearer.sarif
          category: bearer
        continue-on-error: true

      - name: "📤 Upload Bearer SARIF artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bearer-report
          path: bearer.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB FINAL : SUMMARY
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "📋 Security & Build Summary"
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
      - semgrep
      - guarddog
      - scorecard
      - codeql
      - gitleaks
      - bearer
    if: always()

    steps:
      - name: "📋 Write Job Summary"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🔒 Grok Build – Security & Build Report

          | Job | Statut |
          |-----|--------|
          | 🏗️ Build Windows AMD64 | ${{ needs.build-windows-amd64.result }} |
          | 🔎 Semgrep             | ${{ needs.semgrep.result }} |
          | 🐕 GuardDog           | ${{ needs.guarddog.result }} |
          | 🏆 OSSF Scorecard     | ${{ needs.scorecard.result }} |
          | 🧬 CodeQL             | ${{ needs.codeql.result }} |
          | 🔑 Gitleaks           | ${{ needs.gitleaks.result }} |
          | 🛡️ Bearer              | ${{ needs.bearer.result }} |

          > 🔍 Résultats dans **Security > Code scanning** (SARIF uploadés).
          > 📦 Binaire Windows dans les **Artifacts** de ce run.
          > ℹ️ CodeQL ignoré si aucun langage supporté détecté (repo Rust pur).
          EOF
