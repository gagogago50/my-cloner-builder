# .github/workflows/grok-build-windows-amd64.yml

name: "Grok Build – Windows AMD64 + Security Scans"

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  GROK_DIR: "grok-build"
  # Version de protoc cohérente avec bin/protoc (v29.3)
  PROTOC_VERSION: "29.3"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 : BUILD WINDOWS AMD64
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows-amd64:
    name: "🏗️ Build – Windows AMD64 (Rust)"
    runs-on: windows-latest

    steps:
      - name: "📥 Checkout current repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 Clone xai-org/grok-build"
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/xai-org/grok-build.git $env:GROK_DIR
          Write-Host "=== Cloned files ==="
          Get-ChildItem $env:GROK_DIR | Select-Object -ExpandProperty Name

      # ── INSTALL PROTOC NATIF WINDOWS ──────────────────────────────────────
      # arduino/setup-protoc installe protoc.exe Windows x64 et le met dans PATH
      - name: "⚙️ Install protoc ${{ env.PROTOC_VERSION }} (Windows native)"
        uses: arduino/setup-protoc@v3
        with:
          version: "${{ env.PROTOC_VERSION }}"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # ── FIX CRITIQUE : Patcher bin/protoc pour ajouter l'entrée Windows ──
      # Le manifeste DotSlash de bin/protoc ne contient que macOS + Linux.
      # find_protoc.rs appelle ce fichier EN PREMIER via DotSlash.
      # DotSlash ne trouve pas de plateforme "windows-x86_64" → panic unwrap.
      # Solution : injecter l'entrée Windows dans le JSON DotSlash,
      # en pointant vers le vrai protoc.exe installé par arduino/setup-protoc.
      - name: "🔧 Patch bin/protoc DotSlash manifest (add Windows entry)"
        shell: pwsh
        run: |
          # Trouver le chemin absolu de protoc.exe installé
          $protocExe = (Get-Command protoc -ErrorAction Stop).Source
          Write-Host "✅ protoc found at: $protocExe"
          protoc --version

          # Écrire le chemin dans GITHUB_ENV pour les steps suivants
          "PROTOC=$protocExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Lire le fichier DotSlash actuel
          $dotslashFile = "$env:GROK_DIR\bin\protoc"
          Write-Host "=== Original bin/protoc content ==="
          Get-Content $dotslashFile

          # Patcher avec Python : ajouter la plateforme windows-x86_64
          # Le format DotSlash JSON a une clé "platforms" avec les OS/arch
          python3 @"
          import json, sys

          path = r'$dotslashFile'.replace('\\', '/')
          protoc_exe = r'$protocExe'.replace('\\', '/')

          with open(path, 'r') as f:
              content = f.read()

          # Le fichier DotSlash commence par un shebang #!/usr/bin/env dotslash
          # suivi d'un JSON. Trouver le début du JSON.
          json_start = content.find('{')
          shebang = content[:json_start]
          json_str = content[json_start:]

          data = json.loads(json_str)

          # Ajouter l'entrée Windows si absente
          platforms = data.get('platforms', {})
          if 'windows-x86_64' not in platforms:
              # On crée une entrée Windows qui utilise le protoc natif installé
              # Format : path vers un exécutable local (DotSlash supporte "path")
              platforms['windows-x86_64'] = {
                  'source': {
                      'type': 'local',
                      'path': protoc_exe
                  }
              }
              data['platforms'] = platforms
              print(f'✅ Added windows-x86_64 entry pointing to: {protoc_exe}')
          else:
              print('ℹ️  windows-x86_64 already present in manifest')

          patched = shebang + json.dumps(data, indent=2)
          with open(path, 'w') as f:
              f.write(patched)

          print('✅ bin/protoc patched successfully')
          print('=== Patched content ===')
          print(patched[:500])
          "@

          Write-Host "=== Patched bin/protoc ==="
          Get-Content $dotslashFile | Select-Object -First 30

      # ── ALTERNATIVE ROBUSTE : wrapper batch qui bypass DotSlash ──────────
      # Si le format DotSlash "local" n'est pas supporté par la version installée,
      # on crée un fallback : un script batch bin/protoc.bat qui appelle protoc.exe
      # DotSlash sur Windows cherche bin/protoc.bat en priorité sur bin/protoc
      - name: "🔧 Create bin/protoc.bat wrapper (DotSlash bypass fallback)"
        shell: pwsh
        run: |
          $protocExe = $env:PROTOC
          $batFile   = "$env:GROK_DIR\bin\protoc.bat"

          # Créer un wrapper .bat minimal
          @"
          @echo off
          "$protocExe" %*
          "@ | Out-File -FilePath $batFile -Encoding ascii

          Write-Host "✅ Created $batFile -> $protocExe"
          Get-Content $batFile

          # Aussi créer bin/protoc.exe comme simple copie pour les cas où
          # le build script cherche exactement ce nom dans le même dossier
          $binDir = "$env:GROK_DIR\bin"
          Copy-Item $protocExe "$binDir\protoc.exe" -Force
          Write-Host "✅ Copied protoc.exe to $binDir\protoc.exe"

          # Mettre bin/ en tête du PATH pour que cargo build le trouve en premier
          "$binDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "✅ $binDir added to PATH"

      - name: "🦀 Install Rust toolchain (depuis grok-build/rust-toolchain.toml)"
        shell: pwsh
        run: |
          Set-Location $env:GROK_DIR
          rustup show    # installe la toolchain épinglée dans rust-toolchain.toml
          rustup target add x86_64-pc-windows-msvc
          rustc --version
          cargo --version

      - name: "💾 Cache Cargo registry & build artifacts"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ${{ env.GROK_DIR }}/target/
          key: windows-amd64-cargo-${{ hashFiles(format('{0}/Cargo.lock', env.GROK_DIR)) }}
          restore-keys: |
            windows-amd64-cargo-

      - name: "🔧 Install DotSlash (pour autres outils hermétiques bin/*)"
        uses: facebook/install-dotslash@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "🔍 Verify full environment before build"
        shell: pwsh
        run: |
          Write-Host "=== rustc ===" ; rustc --version
          Write-Host "=== cargo ===" ; cargo --version
          Write-Host "=== dotslash ===" ; dotslash --version
          Write-Host "=== protoc (PATH) ===" ; protoc --version
          Write-Host "=== PROTOC env ===" ; Write-Host $env:PROTOC
          Write-Host "=== bin/ contents ==="
          Get-ChildItem "$env:GROK_DIR\bin"
          Write-Host "=== PATH (first 5 entries) ==="
          $env:PATH -split ';' | Select-Object -First 5

      # ── BUILD ──────────────────────────────────────────────────────────────
      # PROTOC est dans GITHUB_ENV (écrit au step "Patch") → visible par cargo
      # bin/protoc.bat + bin/protoc.exe sont dans bin/ en tête de PATH
      # → find_protoc.rs trouvera protoc sans paniquer
      - name: "🏗️ cargo build --release (xai-grok-pager-bin)"
        shell: pwsh
        working-directory: ${{ env.GROK_DIR }}
        run: |
          # Redéfinir PROTOC dans le scope PowerShell courant
          # (GITHUB_ENV est lu au début du step, pas besoin de le relire)
          Write-Host "PROTOC = $env:PROTOC"
          Write-Host "protoc version: $(protoc --version)"

          cargo build `
            -p xai-grok-pager-bin `
            --release `
            --target x86_64-pc-windows-msvc
        env:
          # Déclaration explicite : PROTOC doit être visible par le build script Rust
          # ${{ env.PROTOC }} lit depuis GITHUB_ENV (écrit au step Patch)
          PROTOC: ${{ env.PROTOC }}

      - name: "✅ Verify produced binary"
        shell: pwsh
        run: |
          $releaseDir = "$env:GROK_DIR\target\x86_64-pc-windows-msvc\release"
          $candidates = @(
            "$releaseDir\xai-grok-pager.exe",
            "$releaseDir\xai-grok-pager-bin.exe",
            "$releaseDir\grok.exe"
          )
          $found = $false
          foreach ($bin in $candidates) {
            if (Test-Path $bin) {
              $size = [math]::Round((Get-Item $bin).Length / 1MB, 2)
              Write-Host "✅ Binary: $bin ($size MB)"
              $found = $true
            }
          }
          if (-not $found) {
            Write-Host "⚠️ Listing all .exe in $releaseDir :"
            Get-ChildItem $releaseDir -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch "build-script" } |
              ForEach-Object { Write-Host "  Found: $($_.FullName)" }
          }

      - name: "📦 Upload Windows binary artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grok-build-windows-amd64
          path: ${{ env.GROK_DIR }}/target/x86_64-pc-windows-msvc/release/*.exe
          retention-days: 14
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : SEMGREP
  # ───────────────────────────────────────────────────────────────────────────
  semgrep:
    name: "🔎 Semgrep – Code Patterns & Injections"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🔎 Run Semgrep OSS (no API key)"
        run: |
          semgrep scan \
            --config "p/default" \
            --config "p/secrets" \
            --config "p/security-audit" \
            --config "p/rust" \
            --sarif \
            --output semgrep.sarif \
            . grok-build \
            || true

          if ! python3 -c "import json; json.load(open('semgrep.sarif'))" 2>/dev/null; then
            printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep","rules":[]}},"results":[]}]}' \
              > semgrep.sarif
          fi
          echo "✅ semgrep.sarif ($(wc -c < semgrep.sarif) bytes)"

      - name: "📤 Upload Semgrep SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : GUARDDOG
  # ───────────────────────────────────────────────────────────────────────────
  guarddog:
    name: "🐕 GuardDog – Malicious Package Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: "🐕 Install GuardDog"
        run: pip install guarddog

      - name: "🔍 Scan PyPI dependencies"
        run: |
          FOUND=false
          for f in requirements*.txt requirements/*.txt \
                   grok-build/requirements*.txt grok-build/requirements/*.txt; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog pypi verify "$f" --output-format json \
              > "guarddog-pypi-$(basename "$f" .txt).json" 2>&1 || true
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun requirements.txt – scan PyPI ignoré"

      - name: "🔍 Scan npm dependencies"
        run: |
          FOUND=false
          for f in package.json grok-build/package.json; do
            [ -f "$f" ] || continue
            FOUND=true
            echo "=== Scanning $f ==="
            guarddog npm verify "$f" --output-format json \
              > "guarddog-npm-$(echo "$f" | tr '/' '-').json" 2>&1 || true
          done
          [ "$FOUND" = true ] || echo "ℹ️ Aucun package.json – scan npm ignoré"

      - name: "📤 Upload GuardDog results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: guarddog-results
          path: guarddog-*.json
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : OSSF SCORECARD
  # ───────────────────────────────────────────────────────────────────────────
  scorecard:
    name: "🏆 OSSF Scorecard – Repo Security Hygiene"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: "🏆 Run OSSF Scorecard"
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: "📤 Upload Scorecard SARIF"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
        continue-on-error: true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 : CODEQL – auto-détection des langages
  # ───────────────────────────────────────────────────────────────────────────
  codeql:
    name: "🧬 CodeQL – Auto-detect Languages"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🔍 Detect CodeQL-supported languages"
        id: detect-langs
        run: |
          LANGS=""
          if find . grok-build \
               \( -name "*.js" -o -name "*.ts" -o -name "*.jsx" -o -name "*.tsx" \) \
               -not -path "*/node_modules/*" 2>/dev/null | grep -q .; then
            LANGS="javascript-typescript"
          fi
          if find . grok-build -name "*.py" 2>/dev/null | grep -q .; then
            LANGS="${LANGS:+$LANGS,}python"
          fi
          if find . grok-build -name "*.go" 2>/dev/null | grep -q .; then
            LANGS="${LANGS:+$LANGS,}go"
          fi
          if [ -z "$LANGS" ]; then
            echo "ℹ️ Aucun langage CodeQL-compatible (repo Rust pur)"
            echo "skip=true"  >> "$GITHUB_OUTPUT"
            echo "langs="     >> "$GITHUB_OUTPUT"
          else
            echo "✅ Langages : $LANGS"
            echo "skip=false"    >> "$GITHUB_OUTPUT"
            echo "langs=$LANGS"  >> "$GITHUB_OUTPUT"
          fi

      - name: "🧬 Initialize CodeQL"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ steps.detect-langs.outputs.langs }}
          build-mode: none
          queries: security-extended,security-and-quality
        continue-on-error: true

      - name: "🔍 Perform CodeQL Analysis"
        if: steps.detect-langs.outputs.skip == 'false'
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql-auto
        continue-on-error: true

      - name: "ℹ️ CodeQL skipped (Rust-only)"
        if: steps.detect-langs.outputs.skip == 'true'
        run: |
          echo "## 🧬 CodeQL" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ Ignoré : projet 100% Rust — CodeQL ne supporte pas encore Rust." \
            >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 : GITLEAKS
  # ───────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: "🔑 Gitleaks – Secrets Detection"
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout (full history)"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"

      - name: "📤 Upload Gitleaks report"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 7 : BEARER – CLI directe + sanitize SARIF
  # ───────────────────────────────────────────────────────────────────────────
  bearer:
    name: "🛡️ Bearer – SAST & Secrets"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "📥 Clone grok-build"
        run: git clone --depth 1 https://github.com/xai-org/grok-build.git grok-build

      - name: "🛡️ Install Bearer CLI"
        run: |
          curl -sfL \
            https://raw.githubusercontent.com/Bearer/bearer/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          bearer version

      - name: "🛡️ Run Bearer scan"
        run: |
          bearer scan . grok-build \
            --format sarif \
            --output bearer-raw.sarif \
            --severity critical,high,medium \
            --scanner secrets \
            --quiet \
            || true

      - name: "🔧 Sanitize Bearer SARIF (null → [])"
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          SKELETON = {
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {"driver": {"name": "Bearer", "version": "2.x", "rules": []}},
              "results": [],
              "artifacts": []
            }]
          }

          raw = "bearer-raw.sarif"
          out = "bearer.sarif"

          if not os.path.exists(raw):
            print("⚠️ bearer-raw.sarif absent → squelette vide")
            json.dump(SKELETON, open(out, "w"), indent=2)
            sys.exit(0)

          try:
            data = json.load(open(raw))
          except json.JSONDecodeError as e:
            print(f"⚠️ JSON invalide: {e} → squelette vide")
            json.dump(SKELETON, open(out, "w"), indent=2)
            sys.exit(0)

          for run in data.get("runs", []):
            if not isinstance(run.get("results"),   list): run["results"]   = []
            if not isinstance(run.get("artifacts"), list): run["artifacts"] = []
            drv = run.get("tool", {}).get("driver", {})
            if not isinstance(drv.get("rules"), list):     drv["rules"]     = []

          json.dump(data, open(out, "w"), indent=2)

          # Validation finale
          check = json.load(open(out))
          for i, r in enumerate(check.get("runs", [])):
            assert isinstance(r["results"], list), f"run[{i}].results n'est pas une liste!"
          print(f"✅ bearer.sarif valide — {len(check['runs'])} run(s), prêt pour upload")
          PYEOF

      - name: "📤 Upload Bearer SARIF to GitHub Security"
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bearer.sarif
          category: bearer
        continue-on-error: true

      - name: "📤 Upload Bearer SARIF artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bearer-report
          path: bearer.sarif
          if-no-files-found: ignore
          retention-days: 7

  # ───────────────────────────────────────────────────────────────────────────
  # JOB FINAL : SUMMARY
  # ───────────────────────────────────────────────────────────────────────────
  summary:
    name: "📋 Security & Build Summary"
    runs-on: ubuntu-latest
    needs:
      - build-windows-amd64
      - semgrep
      - guarddog
      - scorecard
      - codeql
      - gitleaks
      - bearer
    if: always()

    steps:
      - name: "📋 Write Job Summary"
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## 🔒 Grok Build – Security & Build Report

          | Job | Statut |
          |-----|--------|
          | 🏗️ Build Windows AMD64 | ${{ needs.build-windows-amd64.result }} |
          | 🔎 Semgrep             | ${{ needs.semgrep.result }} |
          | 🐕 GuardDog           | ${{ needs.guarddog.result }} |
          | 🏆 OSSF Scorecard     | ${{ needs.scorecard.result }} |
          | 🧬 CodeQL             | ${{ needs.codeql.result }} |
          | 🔑 Gitleaks           | ${{ needs.gitleaks.result }} |
          | 🛡️ Bearer              | ${{ needs.bearer.result }} |

          > 🔍 Résultats dans **Security > Code scanning**.
          > 📦 Binaire Windows dans les **Artifacts** de ce run.
          > ℹ️ CodeQL ignoré si aucun langage supporté détecté (repo Rust pur).
          EOF
