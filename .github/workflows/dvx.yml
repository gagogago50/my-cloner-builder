name: Build DXVK & Security Scan

on:
  workflow_dispatch:

jobs:
  # --- JOB 1 : SCAN DE SÉCURITÉ ---
  scan-code:
    name: Scanner le code (CodeQL & Trivy)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Récupérer le code source de DXVK
        uses: actions/checkout@v4
        with:
          repository: 'doitsujin/dxvk' # <-- AJOUT : Force le clonage du dépôt cible
          submodules: recursive

      - name: Initialiser CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'cpp'

      - name: Scan de vulnérabilités avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Exécuter l'analyse CodeQL
        uses: github/codeql-action/analyze@v3

  # --- JOB 2 : COMPILATION WINDOWS AMD64 ---
  build-windows:
    name: Build DXVK (Windows x64)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code source de DXVK
        uses: actions/checkout@v4
        with:
          repository: 'doitsujin/dxvk' # <-- AJOUT : Force le clonage du dépôt cible
          submodules: recursive

      - name: Installer les outils de compilation
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build g++-mingw-w64-x86-64 gcc-mingw-w64-x86-64 glslang-tools

      - name: Configurer le build (Meson Cross-compilation)
        run: |
          meson setup --cross-file build-win64.txt --buildtype release build.w64

      - name: Compiler le projet (Ninja)
        run: |
          ninja -C build.w64

      - name: Archiver et Télécharger les DLLs générées
        uses: actions/upload-artifact@v4
        with:
          name: dxvk-windows-amd64
          path: |
            build.w64/src/**/*.dll
