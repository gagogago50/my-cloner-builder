name: Secure Build Cheat Engine (Windows AMD64)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      build_mode:
        description: "Mode de build (ex: Release, Debug)"
        required: false
        default: "Release"
        type: string
      artifact_path:
        description: "Glob des fichiers à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Security Scans (parallel)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan: [binaries, clamav, gitleaks, socket, patterns]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ matrix.scan == 'gitleaks' && 0 || 1 }}

      # ... (conserve ici tes étapes de scan conditionnées par matrix.scan)

  build:
    name: "Build Windows AMD64"
    runs-on: windows-latest
    needs: security-scans
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}

      - name: Install Lazarus & FPC
        run: |
          choco install lazarus -y --no-progress
        shell: pwsh

      - name: Configure Parallel Compilation (-j4)
        run: |
          # Recherche dynamique du fichier fpc.cfg dans le dossier d'installation de Lazarus
          $fpcCfg = (Get-ChildItem -Path "C:\lazarus" -Filter "fpc.cfg" -Recurse | Select-Object -First 1).FullName
          
          if ($fpcCfg) {
              Write-Host "Fichier de configuration trouvé ici : $fpcCfg"
              # Ajout de l'option -j4 à la fin du fichier pour activer le multi-threading
              Add-Content -Path $fpcCfg -Value "`n-j4"
              Write-Host "Optimisation -j4 injectée avec succès."
          } else {
              Write-Error "Impossible de localiser le fichier fpc.cfg dans C:\lazarus"
              exit 1
          }
        shell: pwsh

      - name: Build Cheat Engine
        run: |
          & "C:\lazarus\lazbuild.exe" --build-mode="${{ inputs.build_mode }}" --cpu=x86_64 --os=win64 "Cheat Engine/cheatengine.lpi"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-engine-win64
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
