name: Secure Build Any Project

# Annule automatiquement les anciennes exécutions en cours si tu relances le workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      artifact_path:
        description: "Glob du binaire a uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  # Étape 1 : Les scans s'exécutent à la chaîne sur 1 seul runner (économie de slots)
  security-scans:
    name: "Sequential Security Scans"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

          # Le jeton '0' sous forme de chaîne évite le bug du 0 falsy de GitHub
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Setup ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true

      - name: Scan repository with ClamAV
        run: clamscan --recursive --infected --quiet . || true

      - name: Pattern scan
        run: |
          echo "Recherche de motifs sensibles (non bloquant)"
          grep -rniE "(password|secret|token|api_key)" . || true

  # Étape 2 : Le build Windows tourne EN MÊME TEMPS que le job de scan (2ème runner)
  build:
    name: "Build Windows AMD64"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: true

      - name: Install Lazarus & FPC
        run: choco install lazarus -y --no-progress
        shell: pwsh

      - name: Verify lazbuild
        run: |
          & "C:\lazarus\lazbuild.exe" --version
        shell: pwsh

      # CORRECTION : L'argument --fpcb a été définitivement supprimé.
      # Le changement de build-mode à "Release" correspond à la configuration par défaut de Cheat Engine.
      # Les drapeaux --cpu et --os forcent proprement la compilation AMD64.
       villains-name: Build Cheat Engine (64-bit Release)
        run: |
          & "C:\lazarus\lazbuild.exe" --build-mode="Release" --cpu=x86_64 --os=win64 "Cheat Engine/cheatengine.lpi"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-engine-win64
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
