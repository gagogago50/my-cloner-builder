name: Secure Build Any Project

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Sequential Security Scans"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create Gitleaks allowlist
        run: |
          # Correction de la syntaxe TOML (les triples quotes dans un tableau sont invalides)
          cat > .gitleaks.toml << 'EOF'
          [extend]
          useDefault = true

          [allowlist]
          description = "Faux positifs connus - code source Cheat Engine tiers"
          paths = [
            "Cheat Engine/feces\\.pas",
            "Cheat Engine/frmluaengineunit\\.lfm"
          ]
          EOF

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

      - name: Setup ClamAV
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true

      - name: Scan repository with ClamAV
        continue-on-error: true
        run: clamscan --recursive --infected --quiet . || true

      - name: Pattern scan
        continue-on-error: true
        run: |
          echo "Recherche de motifs sensibles (non bloquant)"
          grep -rniE "(password|secret|token|api_key)" . || true

  build:
    name: "Build Windows AMD64"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Lazarus and FPC
        shell: pwsh
        run: choco install lazarus -y --no-progress

      - name: Verify lazbuild
        shell: pwsh
        run: '& "C:\lazarus\lazbuild.exe" --version'

      # ── Enregistrer les packages personnalisés de Cheat Engine (.lpk) ──
      - name: Register Cheat Engine Packages
        shell: pwsh
        run: |
          $lazarusDir = "C:\lazarus"
          $workspace = $env:GITHUB_WORKSPACE
          
          # Trouver tous les fichiers .lpk dans le repo
          $packages = Get-ChildItem -Path $workspace -Filter "*.lpk" -Recurse
          
          foreach ($pkg in $packages) {
              Write-Host "Enregistrement du package: $($pkg.FullName)"
              & "$lazarusDir\lazbuild.exe" --add-package "$($pkg.FullName)"
          }

      # ── Construire les packages enregistrés ──
      - name: Build Registered Packages
        shell: pwsh
        run: |
          $lazarusDir = "C:\lazarus"
          $workspace = $env:GITHUB_WORKSPACE
          
          $packages = Get-ChildItem -Path $workspace -Filter "*.lpk" -Recurse
          
          foreach ($pkg in $packages) {
              Write-Host "Compilation du package: $($pkg.Name)"
              & "$lazarusDir\lazbuild.exe" --build-package "$($pkg.Name)"
          }

      # ── Construire Cheat Engine ──
      - name: Build Cheat Engine 64-bit Release
        shell: pwsh
        run: |
          & "C:\lazarus\lazbuild.exe" `
            --build-mode="Release" `
            --cpu=x86_64 `
            --os=win64 `
            --ws=win32 `
            "$env:GITHUB_WORKSPACE\Cheat Engine\cheatengine.lpi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-engine-win64
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
