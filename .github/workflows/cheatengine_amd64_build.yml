name: Secure Build Any Project (Template)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      build_command:
        description: "Commande de build (non utilisée pour Lazarus/FPC)"
        required: false
        default: ""
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string
      runs_on:
        description: "Runner"
        required: false
        default: "windows-latest"
        type: choice
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest
      node_or_bun:
        description: "Runtime (choisir none pour Pascal/Lazarus)"
        required: false
        default: "none"
        type: choice
        options:
          - bun
          - node
          - none

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Security Scans (non‑bloquants)"
    runs-on: ubuntu-latest
    continue-on-error: true          # ← les échecs internes n’empêchent pas la suite
    strategy:
      fail-fast: false
      matrix:
        scan: [binaries, clamav, gitleaks, socket, patterns]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ matrix.scan == 'gitleaks' && 0 || 1 }}

      # ---------- Gitleaks (sans input invalide) ----------
      - name: Run Gitleaks
        if: matrix.scan == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # L’action utilise automatiquement .gitleaks.toml s’il existe, sinon config par défaut.
        # Aucun paramètre 'config-path' nécessaire.

      # ---------- ClamAV (sortie propre même si code !=0) ----------
      - name: Setup ClamAV
        if: matrix.scan == 'clamav'
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true   # base de données parfois non dispo
      - name: Scan repository with ClamAV
        if: matrix.scan == 'clamav'
        run: clamscan --recursive --infected --quiet . || true   # exit 2 traité

      # ---------- Pattern scan ----------
      - name: Pattern scan
        if: matrix.scan == 'patterns'
        run: |
          echo "Recherche de motifs sensibles (non bloquant)"
          grep -rniE "(password|secret|token|api_key)" . || true

      # ---------- Placeholders pour socket / binaries ----------
      - name: Socket scan placeholder
        if: matrix.scan == 'socket'
        run: |
          echo "Socket scan – à personnaliser (socket.dev, etc.)"
          # Exemple: npm install -g @socketsecurity/cli && socket scan .

      - name: Binaries scan placeholder
        if: matrix.scan == 'binaries'
        run: |
          echo "Binaries scan – à personnaliser (trivy, syft/grype…)"
          # Exemple: wget https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.deb
          # sudo dpkg -i trivy*.deb && trivy fs --skip-dirs Cheat\ Engine/bin  .

  build:
    name: "Build ${{ inputs.runs_on }}"
    runs-on: ${{ inputs.runs_on }}
    needs: security-scans           # le job est toujours considéré comme réussi (continue-on-error)
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: true

      - name: Install Lazarus & FPC
        run: choco install lazarus -y --no-progress
        shell: pwsh

      - name: Verify lazbuild
        run: & "C:\lazarus\lazbuild.exe" --version
        shell: pwsh

      - name: Build Cheat Engine (64-bit Release)
        run: |
          & "C:\lazarus\lazbuild.exe" --build-mode="Release_64" "Cheat Engine/cheatengine.lpi"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.runs_on }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
