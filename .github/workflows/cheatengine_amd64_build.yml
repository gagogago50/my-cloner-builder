name: Secure Build Any Project (Template)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: XiaomiMiMo/MiMo-Code)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      build_command:
        description: "Commande de build (non utilisée pour Lazarus/FPC)"
        required: false
        default: ""
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string
      runs_on:
        description: "Runner"
        required: false
        default: "windows-latest"
        type: choice
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest
      node_or_bun:
        description: "Runtime (choisir none pour Pascal/Lazarus)"
        required: false
        default: "none"
        type: choice
        options:
          - bun
          - node
          - none

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Security Scans (parallel)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan: [binaries, clamav, gitleaks, socket, patterns]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ matrix.scan == 'gitleaks' && 0 || 1 }}

      # ... (conserve ici tes étapes de scan conditionnées avec if: matrix.scan == 'xxx')

  build:
    name: "Build ${{ inputs.runs_on }}"
    runs-on: ${{ inputs.runs_on }}
    needs: security-scans
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}

      - name: Install Lazarus & FPC
        run: |
          choco install lazarus -y --no-progress
        shell: pwsh

      # Le build se lance directement ici, sans modification risquée de fpc.cfg
      # lazbuild gère la configuration du projet automatiquement.
      - name: Build Cheat Engine
        run: |
          & "C:\lazarus\lazbuild.exe" --build-mode="Release" --cpu=x86_64 --os=win64 "Cheat Engine/cheatengine.lpi"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.runs_on }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
