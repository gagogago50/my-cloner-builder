name: Secure Build Any Project (Template)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: XiaomiMiMo/MiMo-Code)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      build_command:
        description: "Commande de build (non utilisée pour Lazarus/FPC)"
        required: false
        default: ""
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string
      runs_on:
        description: "Runner"
        required: false
        default: "windows-latest"
        type: choice
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest
      node_or_bun:
        description: "Runtime (choisir none pour Pascal/Lazarus)"
        required: false
        default: "none"
        type: choice
        options:
          - bun
          - node
          - none

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Security Scans (parallel)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan: [binaries, clamav, gitleaks, socket, patterns]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ matrix.scan == 'gitleaks' && 0 || 1 }}

      # ---- Gitleaks: détection de secrets ----
      - name: Run Gitleaks
        if: matrix.scan == 'gitleaks'
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml

      # ---- ClamAV: analyse antivirus ----
      - name: Setup ClamAV
        if: matrix.scan == 'clamav'
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet

      - name: Scan repository with ClamAV
        if: matrix.scan == 'clamav'
        run: clamscan --recursive --infected --quiet .

      # ---- Scan de motifs (patterns) ----
      - name: Pattern scan
        if: matrix.scan == 'patterns'
        run: |
          echo "Recherche de motifs sensibles..."
          grep -rniE "(password|secret|token|api_key)" . || true

      # ---- Scan socket & binaries (exemples) ----
      - name: Socket scan placeholder
        if: matrix.scan == 'socket'
        run: |
          echo "Socket scan – à implémenter selon vos besoins (ex: socket.dev CLI)"
          # Exemple: npm install -g @socketsecurity/cli && socket scan .

      - name: Binaries scan placeholder
        if: matrix.scan == 'binaries'
        run: |
          echo "Binaries scan – à implémenter (ex: trivy, syft/grype, ou VirusTotal)"
          # Exemple: wget https://github.com/aquasecurity/trivy/releases/download/v0.50.1/trivy_0.50.1_Linux-64bit.deb
          # sudo dpkg -i trivy*.deb && trivy fs --skip-dirs Cheat\ Engine/bin  .

  build:
    name: "Build ${{ inputs.runs_on }}"
    runs-on: ${{ inputs.runs_on }}
    needs: security-scans
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: true          # Indispensable : CE utilise plusieurs sous-modules !

      - name: Install Lazarus & FPC
        run: |
          choco install lazarus -y --no-progress
        shell: pwsh

      - name: Verify lazbuild
        run: |
          & "C:\lazarus\lazbuild.exe" --version
        shell: pwsh

      - name: Build Cheat Engine (64-bit Release)
        run: |
          # Le mode Release_64 est le mode natif 64 bits du projet CE
          & "C:\lazarus\lazbuild.exe" --build-mode="Release_64" "Cheat Engine/cheatengine.lpi"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.runs_on }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
