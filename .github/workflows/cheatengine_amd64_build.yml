name: Secure Build Any Project

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Sequential Security Scans"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create Gitleaks allowlist
        run: |
          cat > .gitleaks.toml << 'EOF'
          [extend]
          useDefault = true

          [allowlist]
          description = "Faux positifs connus - code source Cheat Engine tiers"
          paths = [
            '''Cheat Engine/feces\.pas''',
            '''Cheat Engine/frmluaengineunit\.lfm'''
          ]
          EOF

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

      - name: Setup ClamAV
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true

      - name: Scan repository with ClamAV
        continue-on-error: true
        run: clamscan --recursive --infected --quiet . || true

      - name: Pattern scan
        continue-on-error: true
        run: |
          echo "Recherche de motifs sensibles (non bloquant)"
          grep -rniE "(password|secret|token|api_key)" . || true

  build:
    name: "Build Windows AMD64"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: recursive

      - name: Install Lazarus and FPC
        shell: pwsh
        run: choco install lazarus -y --no-progress

      - name: Verify lazbuild
        shell: pwsh
        run: '& "C:\lazarus\lazbuild.exe" --version'

      # ── Initialiser une configuration lazbuild propre ──
      - name: Create custom lazbuild config
        shell: pwsh
        run: |
          $configDir = "$env:RUNNER_TEMP\lazarus_config"
          New-Item -ItemType Directory -Force -Path $configDir
          # Créer le fichier idemake.cfg avec les chemins d'unités de base
          # (les guillemets simples évitent l'expansion des variables)
          @"
          -FuC:\lazarus\lcl\units\x86_64-win64
          -FuC:\lazarus\components\lazutils\lib\x86_64-win64
          -FuC:\lazarus\packager\units\x86_64-win64
          -dLCLwin32
          "@ | Out-File -FilePath "$configDir\idemake.cfg" -Encoding ASCII
          Write-Host "Config file created at $configDir\idemake.cfg"
          # Sauvegarder le chemin pour les étapes suivantes
          "CONFIG_DIR=$configDir" | Out-File -FilePath "$env:GITHUB_ENV" -Append -Encoding utf8

      # ── Compiler LazUtils pour x86_64-win64 ──
      - name: Build LazUtils (Win64)
        shell: pwsh
        run: |
          & "C:\lazarus\lazbuild.exe" `
            --primary-config-path="$env:CONFIG_DIR" `
            --lazarusdir="C:\lazarus" `
            --cpu=x86_64 --os=win64 `
            "C:\lazarus\components\lazutils\lazutils.lpk"
        timeout-minutes: 10

      # ── Ajouter les éventuels chemins de packages Cheat Engine ──
      # (pas besoin de modifier environmentoptions.xml, on va utiliser le fichier idemake.cfg déjà créé)
      - name: Append Cheat Engine paths to config
        shell: pwsh
        run: |
          $configDir = $env:CONFIG_DIR
          $cheatEngineDir = "$env:GITHUB_WORKSPACE\Cheat Engine"
          # Ajouter les sous-répertoires de Cheat Engine si nécessaire (selon le projet)
          # Ici on ajoute simplement le dossier racine du projet, l'unité laz_avl_tree n'est pas dedans.
          # On le fait quand même pour préserver l'idée d'ajout de PackagePath.
          Add-Content -Path "$configDir\idemake.cfg" -Value "-Fu$cheatEngineDir"

      # ── Construire Cheat Engine ──
      - name: Build Cheat Engine 64-bit Release
        shell: pwsh
        run: |
          & "C:\lazarus\lazbuild.exe" `
            --primary-config-path="$env:CONFIG_DIR" `
            --lazarusdir="C:\lazarus" `
            --build-mode="Release" `
            --cpu=x86_64 --os=win64 `
            "$env:GITHUB_WORKSPACE\Cheat Engine\cheatengine.lpi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-engine-win64
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
