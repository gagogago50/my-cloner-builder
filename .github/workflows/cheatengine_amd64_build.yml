name: Secure Build Any Project

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      build_command:
        description: "Commande de build (non utilisee pour Lazarus/FPC)"
        required: false
        default: ""
        type: string
      artifact_path:
        description: "Glob du binaire a uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string
      runs_on:
        description: "Runner"
        required: false
        default: "windows-latest"
        type: choice
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest
      node_or_bun:
        description: "Runtime (choisir none pour Pascal/Lazarus)"
        required: false
        default: "none"
        type: choice
        options:
          - bun
          - node
          - none

permissions:
  contents: read
  security-events: write

jobs:
  # Ce job regroupe tous les scans à la chaîne (1 seul runner utilisé)
  security-scans:
    name: "Sequential Security Scans"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0 # Requis à 0 pour que Gitleaks puisse analyser tout l'historique

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Setup ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true

      - name: Scan repository with ClamAV
        run: clamscan --recursive --infected --quiet . || true

      - name: Pattern scan
        run: |
          echo "Recherche de motifs sensibles (non bloquant)"
          grep -rniE "(password|secret|token|api_key)" . || true

      - name: Socket scan placeholder
        run: |
          echo "Socket scan - a personnaliser (socket.dev, etc.)"

      - name: Binaries scan placeholder
        run: |
          echo "Binaries scan - a personnaliser (trivy, syft/grype...)"

  # Ce job se lance EN MÊME TEMPS que le job security-scans (2ème runner utilisé)
  build:
    name: "Build ${{ inputs.runs_on }}"
    runs-on: ${{ inputs.runs_on }}
    # Pas de "needs: security-scans" ici pour permettre l'exécution parallèle
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: true

      - name: Install Lazarus & FPC
        run: choco install lazarus -y --no-progress
        shell: pwsh

      - name: Verify lazbuild
        run: |
          & "C:\lazarus\lazbuild.exe" --version
        shell: pwsh

      - name: Build Cheat Engine (64-bit Release)
        run: |
          & "C:\lazarus\lazbuild.exe" --build-mode="Release_64" "Cheat Engine/cheatengine.lpi"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.runs_on }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
