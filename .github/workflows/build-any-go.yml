name: Compile Remote Go Project

on:
  workflow_dispatch: # Déclencheur manuel

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      # 1. Clonage de Bearer directement depuis son dépôt officiel
      - name: Clone Target Repository
        run: |
          git clone --depth 1 https://github.com/bearer/bearer.git target-app

      # 2. Configuration de l'environnement Go
      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # 3. Compilation croisée pour Windows (en ciblant le dossier de l'exécutable)
      - name: Compile Binary for Windows
        run: |
          cd target-app
          $env:GOOS="windows"
          $env:GOARCH="amd64"
          # On cherche le dossier contenant le binaire principal (souvent cmd/bearer ou via le pattern ./...)
          if (Test-Path "cmd/bearer") {
              go build -o ../bearer.exe ./cmd/bearer
          } else {
              go build -o ../bearer.exe .
          }

      # 4. Envoi du fichier .exe dans les artefacts de l'action
      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: bearer-windows
          path: bearer.exe
