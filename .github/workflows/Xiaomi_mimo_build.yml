name: Secure Pre-Build Gatekeeper (Template)

on:
  workflow_dispatch: # Déclenchement UNIQUEMENT manuel depuis l'interface GitHub

jobs:
  # ÉTAPE 1 : Les vérifications de sécurité fondamentales
  security-verification:
    name: Integrity & Security Scan
    runs-on: ubuntu-latest

    steps:
      # Récupère le code source du dépôt actuel
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Détection des binaires pré-compilés interdits (Anti-Malware)
      - name: Check for Pre-compiled Binaries (Anti-Malware Gate)
        run: |
          echo "Recherche de fichiers binaires suspects..."
          SUSPECT_EXTENSIONS="exe dll bin msi sys so dylib bat cmd cpl scr"
          FOUND_BINARIES=""
          
          for ext in $SUSPECT_EXTENSIONS; do
            FILES=$(find . -type f -iname "*.$ext" -not -path "*/.git/*" -not -path "*/node_modules/*")
            if [ ! -z "$FILES" ]; then
              echo "⚠️ ALERTE : Fichier(s) .$ext détecté(s) :"
              echo "$FILES"
              FOUND_BINARIES="true"
            fi
          done
          
          if [ "$FOUND_BINARIES" = "true" ]; then
            echo "❌ ERREUR CRITIQUE : Le dépôt contains des fichiers binaires."
            exit 1
          else
            echo "✅ Aucun binaire pré-compilé suspect trouvé."
          fi

      # Détection des attaques de Supply Chain (Socket)
      - name: Scan Dependencies for Malware & Obfuscation (Socket)
        uses: SocketDev/action@v1
        with:
          socket-token: ${{ secrets.SOCKET_SECURITY_API_KEY }} 
          mode: 'firewall'

      # Détection des vulnérabilités logiques (Semgrep OSS)
      - name: Scan Source Code Logic (Semgrep OSS)
        uses: semgrep/semgrep-action@v1
        continue-on-error: true # CORRECTION : Affiche les 18 failles mais NE BLOQUE PLUS le build de l'application
        with:
          config: "p/security-audit p/secrets"

  # ÉTAPE 2 : Le build proprement dit (Se lancera désormais sans problème)
  build-application:
    name: Compile & Build Project
    needs: security-verification
    runs-on: ubuntu-latest # À remplacer par windows-latest si vous compilez le .exe de MiMo
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Commande de build réelle (Mettez vos étapes Bun / Node / C# ici)
      - name: Run Build Command
        run: |
          echo "Lancement de la compilation..."
