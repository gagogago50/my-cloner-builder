name: Build MiMo-Code Windows x64 (Parallel + Report)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branche / tag / commit"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

env:
  UPSTREAM_REPO: XiaomiMiMo/MiMo-Code

jobs:
  # =========================================================================
  # JOB 1 — TOUS LES SCANS + RAPPORT MD (1 seul runner Ubuntu)
  # =========================================================================
  security-and-report:
    name: "🔐 Security scans + Report"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Prepare results dir
        run: mkdir -p results report

      # ---------- 1) Binaires précompilés ----------
      - name: "🛡️ Binary / precompiled scan"
        run: |
          set +e
          LOG=results/binaries.log
          STATUS=PASS
          FOUND=0
          {
            echo "# Binary / Precompiled Scan"
            echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
          } > "$LOG"

          SUSPECT_EXT="exe dll bin msi sys so dylib bat cmd cpl scr pyc class jar war com pif"
          for ext in $SUSPECT_EXT; do
            mapfile -t FILES < <(find . -type f -iname "*.$ext" \
              -not -path "*/.git/*" -not -path "*/node_modules/*" \
              -not -path "*/dist/*" -not -path "*/build/*" 2>/dev/null || true)
            if [ ${#FILES[@]} -gt 0 ]; then
              echo "### .$ext" >> "$LOG"
              printf '%s\n' "${FILES[@]}" >> "$LOG"
              FOUND=1
            fi
          done

          echo "" >> "$LOG"
          echo "## Headers PE/ELF/Mach-O" >> "$LOG"
          while IFS= read -r -d '' f; do
            TYPE=$(file -b "$f" 2>/dev/null || true)
            if echo "$TYPE" | grep -qE 'PE32|PE32\+|ELF|Mach-O|executable|shared object|MS-DOS executable'; then
              if ! echo "$f" | grep -qE '\.(png|jpg|jpeg|gif|ico|woff2?|ttf|otf|svg|wasm)$'; then
                echo "- \`$f\` → $TYPE" >> "$LOG"
                FOUND=1
              fi
            fi
          done < <(find . -type f -not -path "*/.git/*" -not -path "*/node_modules/*" -size +512c -print0 2>/dev/null | head -z -n 2000)

          if [ "$FOUND" -eq 1 ]; then
            STATUS=FAIL
            echo "" >> "$LOG"
            echo "**Résultat: FAIL**" >> "$LOG"
          else
            echo "" >> "$LOG"
            echo "**Résultat: PASS**" >> "$LOG"
          fi
          echo "$STATUS" > results/binaries.status
          cat "$LOG"

      # ---------- 2) ClamAV ----------
      - name: "🦠 ClamAV"
        run: |
          set +e
          sudo apt-get update -qq
          sudo apt-get install -y -qq clamav clamav-freshclam
          sudo freshclam --quiet || true

          LOG=results/clamav.log
          clamscan -r -i \
            --exclude-dir=.git --exclude-dir=node_modules \
            --exclude-dir=dist --exclude-dir=build \
            --max-filesize=50M --max-scansize=200M \
            . > "$LOG" 2>&1
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "PASS" > results/clamav.status
            echo "" >> "$LOG"
            echo "**Résultat: PASS**" >> "$LOG"
          elif [ $RC -eq 1 ]; then
            echo "FAIL" > results/clamav.status
            echo "" >> "$LOG"
            echo "**Résultat: FAIL** — infection(s)" >> "$LOG"
          else
            echo "WARN" > results/clamav.status
            echo "" >> "$LOG"
            echo "**Résultat: WARN** — exit $RC" >> "$LOG"
          fi
          cat "$LOG"

      # ---------- 3) Gitleaks ----------
      - name: "🔑 Gitleaks"
        run: |
          set +e
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks

          LOG=results/gitleaks.log
          gitleaks detect --source . --no-git -v \
            --report-path results/gitleaks-report.json 2>&1 | tee "$LOG"
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "PASS" > results/gitleaks.status
            echo "" >> "$LOG"
            echo "**Résultat: PASS**" >> "$LOG"
          else
            echo "FAIL" > results/gitleaks.status
            echo "" >> "$LOG"
            echo "**Résultat: FAIL** — secrets potentiels" >> "$LOG"
          fi

      # ---------- 4) Semgrep ----------
      - name: "🔬 Semgrep"
        continue-on-error: true
        run: |
          set +e
          mkdir -p results
          LOG=results/semgrep.log
          STATUS=PASS

          pip install -q semgrep

          # Lance le scan (exit 1 = findings, c'est normal)
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/javascript \
            --config p/typescript \
            --config p/owasp-top-ten \
            --json -o results/semgrep-report.json \
            --text \
            . > "$LOG" 2>&1
          RC=$?

          # Compte les findings
          FINDINGS=0
          if [ -f results/semgrep-report.json ]; then
            FINDINGS=$(python3 -c "import json; d=json.load(open('results/semgrep-report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo 0)
          fi

          {
            echo ""
            echo "---"
            echo "Semgrep exit code: $RC"
            echo "Findings: $FINDINGS"
          } >> "$LOG"

          # 0 = clean, 1 = findings, >=2 = erreur outil
          if [ "$RC" -ge 2 ]; then
            STATUS=WARN
            echo "**Résultat: WARN** — erreur Semgrep (exit $RC)" >> "$LOG"
          elif [ "$FINDINGS" -gt 0 ] || [ "$RC" -eq 1 ]; then
            STATUS=WARN
            echo "**Résultat: WARN** — $FINDINGS finding(s) (non bloquant pour le build)" >> "$LOG"
          else
            STATUS=PASS
            echo "**Résultat: PASS** — 0 finding" >> "$LOG"
          fi

          echo "$STATUS" > results/semgrep.status

          # Top findings pour le rapport (lisible)
          if [ -f results/semgrep-report.json ] && [ "$FINDINGS" -gt 0 ]; then
            python3 << 'PY' >> "$LOG" || true
          import json
          d = json.load(open("results/semgrep-report.json"))
          results = d.get("results") or []
          print("")
          print(f"## Top findings ({min(20, len(results))} / {len(results)})")
          for r in results[:20]:
              check = r.get("check_id", "?")
              path = r.get("path", "?")
              start = (r.get("start") or {}).get("line", "?")
              msg = (r.get("extra") or {}).get("message", "")[:120]
              sev = (r.get("extra") or {}).get("severity", "")
              print(f"- [{sev}] {check}")
              print(f"  {path}:{start}")
              if msg:
                  print(f"  {msg}")
          PY
          fi

          echo "STATUS=$STATUS FINDINGS=$FINDINGS"
          cat "$LOG"

          # Important : ne jamais faire échouer le job pour des findings
          exit 0

      # ---------- 6) Socket Firewall (action officielle qui marchait) ----------
      - name: "📦 Socket Firewall"
        id: socket
        continue-on-error: true
        uses: SocketDev/action@v1
        with:
          socket-token: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          mode: firewall

      - name: Socket status file
        if: always()
        run: |
          mkdir -p results
          case "${{ steps.socket.outcome }}" in
            success)
              echo "PASS" > results/socket.status
              echo "**Résultat: PASS** — Socket Firewall OK" > results/socket.log
              ;;
            skipped)
              echo "WARN" > results/socket.status
              echo "**Résultat: WARN** — Socket skipped" > results/socket.log
              ;;
            *)
              echo "FAIL" > results/socket.status
              echo "**Résultat: FAIL** — Socket Firewall a bloqué / échoué (token manquant ou alerte). outcome=${{ steps.socket.outcome }}" > results/socket.log
              ;;
          esac
          cat results/socket.log
      # ---------- Rapport MD ----------
      - name: "📋 Generate SECURITY_REPORT.md"
        if: always()
        env:
          REF: ${{ inputs.ref }}
          REPO: ${{ env.UPSTREAM_REPO }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          REPORT=report/SECURITY_REPORT.md

          get_status() {
            local f="results/${1}.status"
            [ -f "$f" ] && tr -d '\r\n' < "$f" || echo "N/A"
          }
          get_log() {
            local f="results/${1}.log"
            [ -f "$f" ] && cat "$f" || echo "_Log non disponible_"
          }
          badge() {
            case "$1" in
              PASS) echo "✅ PASS" ;;
              FAIL) echo "❌ FAIL" ;;
              WARN) echo "⚠️ WARN" ;;
              *)    echo "➖ N/A" ;;
            esac
          }

          S_BIN=$(get_status binaries)
          S_CLAM=$(get_status clamav)
          S_GIT=$(get_status gitleaks)
          S_SOCK=$(get_status socket)
          S_SEM=$(get_status semgrep)
          S_PAT=$(get_status patterns)

          OVERALL="PASS"
          for s in "$S_BIN" "$S_CLAM" "$S_GIT"; do
            [ "$s" = "FAIL" ] && OVERALL="FAIL"
          done
          if [ "$OVERALL" != "FAIL" ]; then
            for s in "$S_SEM" "$S_PAT" "$S_SOCK"; do
              [ "$s" = "WARN" ] || [ "$s" = "FAIL" ] && OVERALL="WARN"
            done
          fi

          {
            echo "# 🔐 Security Report — MiMo-Code Build"
            echo ""
            echo "| Champ | Valeur |"
            echo "|-------|--------|"
            echo "| **Dépôt source** | \`$REPO\` |"
            echo "| **Ref** | \`$REF\` |"
            echo "| **Date (UTC)** | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| **Workflow run** | [Lien]($RUN_URL) |"
            echo "| **Verdict global** | $(badge "$OVERALL") |"
            echo ""
            echo "---"
            echo ""
            echo "## 📊 Synthèse"
            echo ""
            echo "| Outil | Objectif | Statut |"
            echo "|-------|----------|--------|"
            echo "| Binary / Precompiled | Binaires PE/ELF, .exe/.dll… | $(badge "$S_BIN") |"
            echo "| ClamAV | Malware / stealer / backdoor | $(badge "$S_CLAM") |"
            echo "| Gitleaks | Secrets, tokens, clés | $(badge "$S_GIT") |"
            echo "| Socket | Dépendances à risque | $(badge "$S_SOCK") |"
            echo "| Semgrep | Logique, OWASP, secrets code | $(badge "$S_SEM") |"
            echo "| Suspicious Patterns | Obfuscation, install scripts | $(badge "$S_PAT") |"
            echo ""
            echo "> ✅ PASS · ⚠️ WARN · ❌ FAIL"
            echo ""
            echo "---"
            echo ""
            echo "## 1. Binary / Precompiled"
            echo ""
            echo '```'
            get_log binaries
            echo '```'
            echo ""
            echo "## 2. ClamAV"
            echo ""
            echo '```'
            get_log clamav
            echo '```'
            echo ""
            echo "## 3. Gitleaks"
            echo ""
            echo '```'
            get_log gitleaks
            echo '```'
            echo ""
            echo "## 4. Socket"
            echo ""
            echo '```'
            get_log socket
            echo '```'
            echo ""
            echo "## 5. Semgrep"
            echo ""
            echo '```'
            get_log semgrep
            echo '```'
            echo ""
            echo "## 6. Suspicious Patterns"
            echo ""
            get_log patterns
            echo ""
            echo "---"
            echo ""
            echo "## 📎 Artefacts"
            echo ""
            echo "- Binaire : \`MiMo-Code-Windows-x64\`"
            echo "- Ce rapport : \`Security-Report\`"
            echo ""
            echo "## ⚠️ Avertissement"
            echo ""
            echo "Scan automatisé uniquement. Vérifie les WARN/FAIL avant d'exécuter le binaire."
          } > "$REPORT"

          cp -r results report/raw-results 2>/dev/null || true
          echo "===== PREVIEW ====="
          cat "$REPORT"

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Security-Report
          path: report/
          retention-days: 30

  # =========================================================================
  # JOB 2 — BUILD WINDOWS (en parallèle du job sécurité)
  # =========================================================================
  build-windows:
    name: "🏗️ Build Windows AMD64"
    runs-on: windows-latest
    steps:
      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Show project layout (debug)
        shell: pwsh
        run: |
          Write-Host "=== Root ==="
          Get-ChildItem -Force | Format-Table Name, Mode
          Write-Host "=== package.json scripts (root) ==="
          if (Test-Path package.json) { Get-Content package.json | Select-Object -First 80 }
          Write-Host "=== packages ==="
          if (Test-Path packages) { Get-ChildItem packages -Recurse -Depth 2 -ErrorAction SilentlyContinue | Select-Object FullName }

      - name: Install dependencies
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) {
            Write-Host "frozen-lockfile failed, fallback bun install"
            bun install
          }

      - name: Build Windows x64
        shell: pwsh
        run: |
          # Affiche l'aide du script si dispo
          if (Test-Path "packages/opencode/script/build.ts") {
            Write-Host "=== Running build.ts --single ==="
            bun run packages/opencode/script/build.ts --single
          } elseif (Test-Path "packages/opencode/package.json") {
            Write-Host "=== Fallback: bun run build in packages/opencode ==="
            Push-Location packages/opencode
            bun run build
            Pop-Location
          } else {
            Write-Host "=== Fallback: root bun run build ==="
            bun run build
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Discover binaries (debug)
        id: discover
        shell: pwsh
        run: |
          Write-Host "=== All .exe under workspace ==="
          $exes = Get-ChildItem -Path . -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -notmatch '\\node_modules\\|\\\.git\\|\\\.bun\\' }
          if ($exes) {
            $exes | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize
            $exes | ForEach-Object { $_.FullName } | Out-File -FilePath found-exes.txt -Encoding utf8
          } else {
            Write-Host "NONE found"
            "" | Out-File found-exes.txt
          }

          Write-Host "=== dist / out / bin folders ==="
          Get-ChildItem -Path . -Recurse -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -match '^(dist|out|bin|build|release)$' -and $_.FullName -notmatch 'node_modules|\.git' } |
            Select-Object -First 40 FullName

          Write-Host "=== Recent files (last 15 min) ==="
          Get-ChildItem -Path . -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.LastWriteTime -gt (Get-Date).AddMinutes(-15) -and $_.FullName -notmatch 'node_modules|\.git|\.bun' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 50 FullName, Length, LastWriteTime

      - name: Stage artifact folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact-out | Out-Null

          # Chemins historiques MiMo / opencode
          $candidates = @(
            "**/dist/**/opencode.exe",
            "**/dist/**/bin/opencode.exe",
            "**/opencode-windows-x64/**",
            "**/opencode-windows-x64-baseline/**",
            "**/dist/opencode-windows*/**"
          )

          $copied = $false
          foreach ($pattern in @(
            "dist\opencode-windows-x64\bin\opencode.exe",
            "dist\opencode-windows-x64\opencode.exe",
            "packages\opencode\dist\opencode-windows-x64\bin\opencode.exe",
            "packages\opencode\dist\**\opencode.exe"
          )) {
            $hits = Get-ChildItem -Path $pattern -ErrorAction SilentlyContinue
            foreach ($h in $hits) {
              Copy-Item $h.FullName -Destination artifact-out\ -Force
              Write-Host "Copied: $($h.FullName)"
              $copied = $true
            }
          }

          # Filet de sécurité : tout .exe hors node_modules
          if (-not $copied) {
            Get-ChildItem -Path . -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -notmatch '\\node_modules\\|\\\.git\\|\\\.bun\\' } |
              ForEach-Object {
                $rel = $_.FullName.Replace((Get-Location).Path + '\', '')
                $destDir = Join-Path artifact-out (Split-Path $rel -Parent)
                New-Item -ItemType Directory -Force -Path $destDir | Out-Null
                Copy-Item $_.FullName -Destination (Join-Path $destDir $_.Name) -Force
                Write-Host "Fallback copied: $rel"
                $copied = $true
              }
          }

          if (-not $copied) {
            Write-Host "::error::Aucun .exe produit par le build"
            Get-ChildItem artifact-out -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

          Get-ChildItem artifact-out -Recurse | Format-Table FullName, Length

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-Code-Windows-x64
          path: artifact-out/**
          if-no-files-found: error
          retention-days: 14
          compression-level: 9
