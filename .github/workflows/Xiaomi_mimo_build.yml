name: Build MiMo-Code Windows x64

on:
  workflow_dispatch: # Lancement UNIQUEMENT manuel pour ne jamais déclencher vos autres projets (Rizin, DXVK)

jobs:
  # ÉTAPE 1 : Les vérifications de sécurité fondamentales
  security-verification:
    name: Integrity & Security Scan
    runs-on: ubuntu-latest

    steps:
      # Récupération du code source complet du dépôt officiel de Xiaomi
      - name: Checkout Upstream Source Code
        uses: actions/checkout@v4
        with:
          repository: 'XiaomiMiMo/MiMo-Code'
          ref: 'main'

      # Détection des binaires pré-compilés interdits
      - name: Check for Pre-compiled Binaries (Anti-Malware Gate)
        run: |
          echo "Recherche de fichiers binaires suspects..."
          SUSPECT_EXTENSIONS="exe dll bin msi sys so dylib bat cmd cpl scr"
          FOUND_BINARIES=""
          
          for ext in $SUSPECT_EXTENSIONS; do
            FILES=$(find . -type f -iname "*.$ext" -not -path "*/.git/*" -not -path "*/node_modules/*")
            if [ ! -z "$FILES" ]; then
              echo "⚠️ ALERTE : Fichier(s) .$ext détecté(s) :"
              echo "$FILES"
              FOUND_BINARIES="true"
            fi
          done
          
          if [ "$FOUND_BINARIES" = "true" ]; then
            echo "❌ ERREUR CRITIQUE : Le dépôt contient des fichiers binaires pré-compilés."
            exit 1
          else
            echo "✅ Aucun binaire pré-compilé suspect trouvé."
          fi

# Détection des attaques de Supply Chain (Socket)
      - name: Scan Dependencies for Malware & Obfuscation (Socket)
        uses: SocketDev/action@v1
        with:
          socket-token: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          mode: 'firewall' # Remplace 'cli' par 'firewall' pour corriger le bug

      # Détection des vulnérabilités logiques et patterns malveillants dans le code
      - name: Scan Source Code Logic (Semgrep OSS)
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/security-audit p/secrets"
          auditOnInvalidConfig: true

  # ÉTAPE 2 : Le build pour Windows x64 CLI Standalone (Ne se lance QUE si l'Étape 1 réussit)
  build-application:
    name: Compile & Build Project (Windows x64)
    needs: security-verification
    runs-on: windows-latest

    steps:
      # Récupération de la dernière version du code source officiel
      - name: Checkout Upstream Source Code
        uses: actions/checkout@v4
        with:
          repository: 'XiaomiMiMo/MiMo-Code'
          ref: 'main'

      # Installation de l'environnement Bun requis par MiMo-Code
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Installation des dépendances du projet
      - name: Install Dependencies
        run: bun install

      # Compilation en un fichier exécutable Standalone unique (.exe CLI)
      - name: Run Build Command
        run: bun run packages/opencode/script/build.ts --single

      # Publication de l'exécutable Windows x64 en tant qu'artefact de build téléchargeable
      - name: Upload Windows x64 Executable
        uses: actions/upload-artifact@v4
        with:
          name: MiMo-Code-Windows-CLI-x64
          path: '**/dist/opencode-windows-x64/bin/opencode.exe'
          if-no-files-found: error
