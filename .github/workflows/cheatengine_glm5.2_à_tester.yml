name: Secure Build Cheat Engine

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string
      lazarus_version:
        description: "Version de Lazarus (2.2.2 recommandé pour CE)"
        required: false
        default: "2.2.6"
        type: choice
        options:
          - "2.2.6"
          - "2.2.2"

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Sequential Security Scans"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create Gitleaks allowlist
        run: |
          cat > .gitleaks.toml << 'EOF'
          [extend]
          useDefault = true
          [allowlist]
          description = "Faux positifs connus - code source Cheat Engine tiers"
          paths = [
            "Cheat Engine/feces\\.pas",
            "Cheat Engine/frmluaengineunit\\.lfm"
          ]
          EOF

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

      - name: Setup ClamAV
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true

      - name: Scan repository with ClamAV
        continue-on-error: true
        run: clamscan --recursive --infected --quiet . || true

      - name: Pattern scan
        continue-on-error: true
        run: |
          grep -rniE "(password|secret|token|api_key)" --include="*.pas" --include="*.lfm" --include="*.lpi" --include="*.lpr" . || true

  build:
    name: "Build Windows AMD64"
    runs-on: windows-latest
    needs: security-scans
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: recursive

      # ── Setup MSBuild pour les sous-projets .sln ──
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # ── Setup Lazarus ──
      - name: Setup Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: ${{ inputs.lazarus_version }}
          with-cache: true

      # ── Résoudre le dossier racine de Lazarus ──
      - name: Resolve Lazarus directory
        shell: pwsh
        run: |
          $lazbuild = Get-Command lazbuild -ErrorAction SilentlyContinue
          $lazDir = $null
          if ($lazbuild) {
              $lazDir = Split-Path -Parent $lazbuild.Source
              while ($lazDir -and -not (Test-Path (Join-Path $lazDir "fpc"))) {
                  $lazDir = Split-Path -Parent $lazDir
              }
          }
          $candidates = @(
              "D:\a\_temp\installers\lazarus",
              "C:\lazarus",
              "C:\Program Files\Lazarus"
          )
          if (-not $lazDir) {
              foreach ($c in $candidates) {
                  if (Test-Path (Join-Path $c "lazbuild.exe")) { $lazDir = $c; break }
              }
          }
          if (-not $lazDir) {
              $found = Get-ChildItem -Path "D:\a" -Filter "lazbuild.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $lazDir = Split-Path -Parent $found.FullName }
          }
          if (-not $lazDir) { throw "Dossier Lazarus introuvable" }
          Write-Host "Racine Lazarus: $lazDir"
          echo "LAZARUS_DIR=$lazDir" >> $env:GITHUB_ENV

      # ── Installer le cross-compiler i386-win32 (requis pour "Release 32-Bit") ──
      # SourceForge sert des interstitiels HTML; on utilise le miroir FTP Lazarus officiel
      # qui sert directement le .exe. Fallbacks multiples.
      - name: Install i386 cross-compiler (ppc386)
        shell: pwsh
        env:
          LAZARUS_DIR: ${{ env.LAZARUS_DIR }}
        run: |
          $lazDir = $env:LAZARUS_DIR
          $fpcVer = "3.2.2"
          $lazVer = "${{ inputs.lazarus_version }}"
          # tentative de détection plus précise
          try {
              $lazVerRaw = & lazbuild --version 2>&1 | Select-String -Pattern "Lazarus\s+(\d+\.\d+\.\d+)" | Select-Object -First 1
              if ($lazVerRaw -match "(\d+\.\d+\.\d+)") { $lazVer = $matches[1] }
          } catch {}
          Write-Host "Version Lazarus: $lazVer"

          $crossInstaller = "lazarus-$lazVer-fpc-$fpcVer-cross-i386-win32-win64.exe"
          $dest = Join-Path $env:RUNNER_TEMP $crossInstaller

          # Liste de miroirs — le premier qui sert un vrai .exe gagne.
          # Miroir FTP officiel de Free Pascal / Lazarus (pas d'interstitiel HTML)
          $mirrors = @(
              "https://freepascal.dfmk.hu/pub/lazarus/releases/$crossInstaller",
              "https://downloads.sourceforge.net/project/lazarus/Lazarus%20Windows%2064%20bits/Lazarus%20$lazVer/$crossInstaller",
              "ftp://freepascal.dfmk.hu/pub/lazarus/releases/$crossInstaller",
              "https://sourceforge.net/projects/lazarus/files/Lazarus%20Windows%2064%20bits/Lazarus%20$lazVer/$crossInstaller/download"
          )

          $downloaded = $false
          foreach ($url in $mirrors) {
              Write-Host "Tentative de téléchargement: $url"
              try {
                  # UA explicite + follow redirects + use basic parsing (pas de parsing HTML)
                  Invoke-WebRequest -Uri $url -OutFile "$dest" -UseBasicParsing `
                      -UserAgent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) GitHub-Actions-Build" `
                      -MaximumRedirection 10 -ErrorAction Stop
                  # Vérifier que c'est bien un exécutable (début MZ) et pas une page HTML
                  if (Test-Path $dest) {
                      $bytes = [System.IO.File]::ReadAllBytes($dest)[0..1]
                      $magic = [System.Text.Encoding]::ASCII.GetString($bytes)
                      if ($magic -eq "MZ") {
                          $size = (Get-Item $dest).Length
                          Write-Host "OK: $crossInstaller téléchargé ($size bytes) depuis $url"
                          $downloaded = $true
                          break
                      } else {
                          Write-Warning "Le contenu reçu n'est pas un exécutable (magic='$magic') — probable interstitiel HTML. On essaye un autre miroir."
                          Remove-Item $dest -Force -ErrorAction SilentlyContinue
                      }
                  }
              } catch {
                  Write-Warning "Échec URL ($url): $($_.Exception.Message)"
              }
          }

          if (-not $downloaded) {
              Write-Warning "Téléchargement cross-compiler impossible sur tous les miroirs — le mode 32-bit échouera (non-fatal)."
              return
          }

          Write-Host "::group::Installation cross-compiler i386"
          $logFile = Join-Path $env:RUNNER_TEMP "laz_cross_install.log"
          $p = Start-Process -FilePath "$dest" `
            -ArgumentList "/verysilent /suppressmsgboxes /norestart /nocloseapplications /DIR=`"$lazDir`" /LOG=`"$logFile`"" `
            -Wait -PassThru -NoNewWindow
          Write-Host "Code de sortie install: $($p.ExitCode)"
          Write-Host "::endgroup::"
          if (Test-Path $logFile) {
              Get-Content $logFile -Tail 20 | ForEach-Object { Write-Host $_ }
          }

          # Vérifier ppc386.exe
          $ppc386 = Get-ChildItem -Path $lazDir -Filter "ppc386.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ppc386) {
              Write-Host "ppc386.exe trouvé: $($ppc386.FullName)"
              $fpcBinDir = Split-Path -Parent $ppc386.FullName
              echo "$fpcBinDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
              $env:PATH = "$fpcBinDir;$env:PATH"
          } else {
              Write-Warning "ppc386.exe introuvable — mode 32-bit échouera (non-fatal)"
          }

      # ── Enregistrer les packages personnalisés de Cheat Engine ──
      - name: Register and Build Cheat Engine Packages
        shell: pwsh
        env:
          LAZARUS_DIR: ${{ env.LAZARUS_DIR }}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $ceDir = Join-Path $workspace "Cheat Engine"
          Write-Host "::group::Recherche des packages .lpk"
          $packages = Get-ChildItem -Path $ceDir -Filter "*.lpk" -Recurse | Sort-Object Name
          Write-Host "Packages trouvés: $($packages.Count)"
          $packages | ForEach-Object { Write-Host "  - $($_.Name)" }
          Write-Host "::endgroup::"
          foreach ($pkg in $packages) {
              Write-Host "::group::Ajout du package: $($pkg.Name)"
              try {
                  & lazbuild --add-package "$($pkg.FullName)" 2>&1
                  if ($LASTEXITCODE -ne 0) { Write-Warning "Erreur ajout $($pkg.Name), code: $LASTEXITCODE" }
              } catch { Write-Warning "Exception ajout $($pkg.Name): $_" }
              Write-Host "::endgroup::"
          }
          Write-Host "::group::Reconstruction de la configuration Lazarus"
          & lazbuild --build-ide= 2>&1 | Out-Null
          Write-Host "::endgroup::"

      # ── Build Cheat Engine — tous les modes Release ──
      - name: Build Cheat Engine (all release modes)
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $projectPath = Join-Path $workspace "Cheat Engine\cheatengine.lpi"
          Write-Host "::group::Configuration du build"
          Write-Host "Projet: $projectPath"
          if (-not (Test-Path $projectPath)) { throw "Projet non trouvé: $projectPath" }
          Write-Host "::endgroup::"
          $modes = @("Release 64-Bit", "Release 64-Bit O4 AVX2", "Release 32-Bit")
          $globalFail = $false
          foreach ($mode in $modes) {
              Write-Host "::group::Compilation mode: $mode"
              & lazbuild --build-mode="$mode" --max-process-count=4 "$projectPath" 2>&1
              $exitCode = $LASTEXITCODE
              Write-Host "::endgroup::"
              if ($exitCode -ne 0) {
                  Write-Warning "Échec mode '$mode' (code $exitCode) — on continue."
                  $globalFail = $true
              }
          }
          Write-Host "::group::Vérification binaires"
          $binDir = Join-Path $workspace "Cheat Engine\bin"
          if (Test-Path $binDir) {
              Get-ChildItem -Path $binDir -Filter "*.exe" | ForEach-Object {
                  Write-Host "Binaire: $($_.Name) ($($_.Length) bytes)"
              }
          }
          Write-Host "::endgroup::"
          if ($globalFail) {
              $has64 = Test-Path (Join-Path $binDir "cheatengine-x86_64.exe")
              $has64Avx2 = Test-Path (Join-Path $binDir "cheatengine-x86_64-SSE4-AVX2.exe")
              if (-not ($has64 -or $has64Avx2)) {
                  throw "Aucun binaire 64-bit produit — build abandonné."
              }
              Write-Host "Build partiel: au moins un binaire 64-bit présent."
          }

      # ── Sous-projets Lazarus ──
      - name: Build all Lazarus sub-projects (.lpi/.lpr)
        shell: pwsh
        run: |
          $ceDir = Join-Path $env:GITHUB_WORKSPACE "Cheat Engine"
          $subDirs = @("speedhack","luaclient","VEHDebug","Tutorial","betterControls",
                       "plugin","launcher","windowsrepair","ceregreset","common",
                       "winhook","xmplayer","sfx","release")
          $lpiFiles = @()
          $lprFiles = @()
          foreach ($sub in $subDirs) {
              $p = Join-Path $ceDir $sub
              if (Test-Path $p) {
                  $lpiFiles += Get-ChildItem -Path $p -Filter "*.lpi" -Recurse -ErrorAction SilentlyContinue
                  $lprFiles += Get-ChildItem -Path $p -Filter "*.lpr" -Recurse -ErrorAction SilentlyContinue
              }
          }
          foreach ($lpi in $lpiFiles) {
              Write-Host "::group::lazbuild $($lpi.Name)"
              & lazbuild --build-all --max-process-count=4 "$($lpi.FullName)" 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Warning "Échec $($lpi.Name)" }
              Write-Host "::endgroup::"
          }
          foreach ($lpr in $lprFiles) {
              Write-Host "::group::lazbuild $($lpr.Name)"
              & lazbuild --max-process-count=4 "$($lpr.FullName)" 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Warning "Échec $($lpr.Name)" }
              Write-Host "::endgroup::"
          }

      # ── Sous-projets Visual Studio ──
      - name: Build Visual Studio sub-projects (.sln)
        shell: pwsh
        run: |
          $slnFiles = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE "Cheat Engine") -Filter "*.sln" -Recurse -ErrorAction SilentlyContinue
          Write-Host "::group::Solutions VS: $($slnFiles.Count)"
          $slnFiles | ForEach-Object { Write-Host "  SLN: $($_.FullName)" }
          Write-Host "::endgroup::"
          foreach ($sln in $slnFiles) {
              Write-Host "::group::msbuild $($sln.Name)"
              foreach ($platform in @("x86", "x64")) {
                  & msbuild "$($sln.FullName)" /nologo /verbosity:minimal /p:Configuration=Release /p:Platform="$platform" 2>&1
                  if ($LASTEXITCODE -ne 0) {
                      & msbuild "$($sln.FullName)" /nologo /verbosity:minimal /p:Configuration=Release 2>&1
                      if ($LASTEXITCODE -ne 0) { Write-Warning "Échec msbuild $($sln.Name)" }
                      break
                  }
              }
              Write-Host "::endgroup::"
          }

      # ── Copier tcclib -> bin ──
      - name: Copy tcclib DLLs to bin
        shell: pwsh
        run: |
          $tcclibOut = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE "Cheat Engine\tcclib") -Filter "*.dll" -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match "tcclib" }
          if ($tcclibOut) {
              $binDir = Join-Path $env:GITHUB_WORKSPACE "Cheat Engine\bin"
              foreach ($dll in $tcclibOut) {
                  Copy-Item $dll.FullName -Destination $binDir -Force -ErrorAction SilentlyContinue
                  Write-Host "Copié $($dll.Name) -> bin"
              }
          } else { Write-Host "Aucune DLL tcclib trouvée." }

      # ── Résumé final ──
      - name: List final bin folder
        shell: pwsh
        run: |
          $binDir = Join-Path $env:GITHUB_WORKSPACE "Cheat Engine\bin"
          Write-Host "::group::Contenu de $binDir"
          if (Test-Path $binDir) {
              Get-ChildItem -Path $binDir -Recurse -File | Sort-Object FullName | ForEach-Object {
                  $rel = $_.FullName.Substring($binDir.Length + 1)
                  Write-Host ("  {0,-50} {1,12} bytes" -f $rel, $_.Length)
              }
          } else { Write-Warning "bin introuvable!" }
          Write-Host "::endgroup::"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-engine-win64-${{ inputs.ref || 'master' }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
