name: Secure Build Cheat Engine

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string
      lazarus_version:
        description: "Version de Lazarus (2.2.2 recommandé pour CE)"
        required: false
        default: "2.2.6"
        type: choice
        options:
          - "2.2.6"
          - "2.2.2"

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Sequential Security Scans"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create Gitleaks allowlist
        run: |
          cat > .gitleaks.toml << 'EOF'
          [extend]
          useDefault = true
          [allowlist]
          description = "Faux positifs connus - code source Cheat Engine tiers"
          paths = [
            "Cheat Engine/feces\\.pas",
            "Cheat Engine/frmluaengineunit\\.lfm"
          ]
          EOF

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

      - name: Setup ClamAV
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true

      - name: Scan repository with ClamAV
        continue-on-error: true
        run: clamscan --recursive --infected --quiet . || true

      - name: Pattern scan
        continue-on-error: true
        run: |
          grep -rniE "(password|secret|token|api_key)" --include="*.pas" --include="*.lfm" --include="*.lpi" --include="*.lpr" . || true

  build:
    name: "Build Windows AMD64"
    runs-on: windows-latest
    needs: security-scans
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: recursive

      # ── Setup MSBuild pour les sous-projets .sln (tcclib, DirectXMess, mono, dotnet, jvmti, dbkkernel) ──
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # ── Setup Lazarus (version 2.2.x recommandée) ──
      - name: Setup Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: ${{ inputs.lazarus_version }}
          with-cache: true

      # ── Installer le cross-compiler i386-win32 (requis pour le mode "Release 32-Bit") ──
      # Sans ceci: "ppc386.exe can't be executed, error code: 2"
      - name: Resolve Lazarus directory
        id: lazdir
        shell: pwsh
        run: |
          # Essayer via Get-Command d'abord (chemin normal)
          $lazbuild = Get-Command lazbuild -ErrorAction SilentlyContinue
          $lazDir = $null
          if ($lazbuild) {
              $lazDir = Split-Path -Parent $lazbuild.Source
              while ($lazDir -and -not (Test-Path (Join-Path $lazDir "fpc"))) {
                  $lazDir = Split-Path -Parent $lazDir
              }
          }
          # Fallback: emplacement typique de gcarreno/setup-lazarus sur windows-latest
          $candidates = @(
              "D:\a\_temp\installers\lazarus",
              "C:\lazarus",
              "C:\Program Files\Lazarus"
          )
          if (-not $lazDir) {
              foreach ($c in $candidates) {
                  if (Test-Path (Join-Path $c "lazbuild.exe")) { $lazDir = $c; break }
              }
          }
          if (-not $lazDir) {
              $found = Get-ChildItem -Path "D:\" -Filter "lazbuild.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $lazDir = Split-Path -Parent $found.FullName }
          }
          if (-not $lazDir) { throw "Dossier Lazarus introuvable" }
          Write-Host "Racine Lazarus: $lazDir"
          echo "LAZARUS_DIR=$lazDir" >> $env:GITHUB_ENV
          "lazdir=$lazDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install i386 cross-compiler (ppc386)
        shell: pwsh
        env:
          LAZARUS_DIR: ${{ env.LAZARUS_DIR }}
        run: |
          $lazDir = $env:LAZARUS_DIR
          # Dla version Lazarus / FPC
          $fpcVer = "3.2.2"
          $lazVerRaw = & lazbuild --version 2>&1 | Select-String -Pattern "Lazarus\s+(\d+\.\d+\.\d+)" | Select-Object -First 1
          if ($lazVerRaw -match "(\d+\.\d+\.\d+)") { $lazVer = $matches[1] } else { $lazVer = "${{ inputs.lazarus_version }}" }
          Write-Host "Version Lazarus détectée: $lazVer"

          $crossInstaller = "lazarus-$lazVer-fpc-$fpcVer-cross-i386-win32-win64.exe"
          $url = "https://downloads.sourceforge.net/project/lazarus/Lazarus%20Windows%2064%20bits/Lazarus%20$lazVer/$crossInstaller"
          $dest = Join-Path $env:RUNNER_TEMP $crossInstaller

          Write-Host "Téléchargement: $url"
          $maxAttempts = 5
          for ($i = 1; $i -le $maxAttempts; $i++) {
              try {
                  Invoke-WebRequest -Uri $url -OutFile "$dest" -UseBasicParsing -ErrorAction Stop
                  break
              } catch {
                  Write-Warning "Tentative $i échouée: $($_.Exception.Message)"
                  Start-Sleep -Seconds 5
              }
          }
          if (-not (Test-Path $dest)) { throw "Téléchargement cross-compiler i386 impossible: $url" }
          $size = (Get-Item $dest).Length
          Write-Host "Téléchargé $dest ($size bytes)"
          if ($size -lt 1MB) {
              $body = Get-Content $dest -Raw -ErrorAction SilentlyContinue
              Write-Host "Contenu inattendu: $body"
              throw "Le téléchargement n'est pas l'installeur (trop petit)."
          }

          Write-Host "::group::Installation cross-compiler i386"
          $logFile = Join-Path $env:RUNNER_TEMP "laz_cross_install.log"
          $p = Start-Process -FilePath "$dest" `
            -ArgumentList "/verysilent /suppressmsgboxes /norestart /nocloseapplications /DIR=`"$lazDir`" /LOG=`"$logFile`"" `
            -Wait -PassThru -NoNewWindow
          Write-Host "Code de sortie: $($p.ExitCode)"
          Write-Host "::endgroup::"
          if (Test-Path $logFile) {
              Write-Host "::group::Log d'installation (dernières lignes)"
              Get-Content $logFile -Tail 30 | ForEach-Object { Write-Host $_ }
              Write-Host "::endgroup::"
          }

          # Vérifier ppc386.exe
          $ppc386 = Get-ChildItem -Path $lazDir -Filter "ppc386.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($ppc386) {
              Write-Host "ppc386.exe trouvé: $($ppc386.FullName)"
              $fpcBinDir = Split-Path -Parent $ppc386.FullName
              # Ajouter au PATH des steps suivants
              echo "$fpcBinDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
              # Ajouter au PATH du step courant
              $env:PATH = "$fpcBinDir;$env:PATH"
              # Mettre à jour fpc.cfg si nécessaire (parfois requis)
              $fpcCfg = Get-ChildItem -Path $lazDir -Filter "fpc.cfg" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($fpcCfg) { Write-Host "fpc.cfg: $($fpcCfg.FullName)" }
          } else {
              Write-Warning "ppc386.exe introuvable après installation — le mode 32-bit échouera (non-fatal)"
          }

      # ── Enregistrer les packages personnalisés de Cheat Engine ──
      - name: Register and Build Cheat Engine Packages
        shell: pwsh
        env:
          LAZARUS_DIR: ${{ env.LAZARUS_DIR }}
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $ceDir = Join-Path $workspace "Cheat Engine"

          Write-Host "::group::Recherche des packages .lpk"
          $packages = Get-ChildItem -Path $ceDir -Filter "*.lpk" -Recurse | Sort-Object Name
          Write-Host "Packages trouvés: $($packages.Count)"
          $packages | ForEach-Object { Write-Host "  - $($_.Name)" }
          Write-Host "::endgroup::"

          foreach ($pkg in $packages) {
              Write-Host "::group::Ajout du package: $($pkg.Name)"
              try {
                  & lazbuild --add-package "$($pkg.FullName)" 2>&1
                  if ($LASTEXITCODE -ne 0) {
                      Write-Warning "Erreur lors de l'ajout de $($pkg.Name), code: $LASTEXITCODE"
                  }
              } catch {
                  Write-Warning "Exception lors de l'ajout de $($pkg.Name): $_"
              }
              Write-Host "::endgroup::"
          }

          Write-Host "::group::Reconstruction de la configuration Lazarus"
          & lazbuild --build-ide= 2>&1 | Out-Null
          Write-Host "::endgroup::"

      # ── Construire Cheat Engine principal : 64-bit, 64-bit AVX2, 32-bit ──
      - name: Build Cheat Engine (all release modes)
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $projectPath = Join-Path $workspace "Cheat Engine\cheatengine.lpi"

          Write-Host "::group::Configuration du build"
          Write-Host "Projet: $projectPath"
          if (-not (Test-Path $projectPath)) {
              throw "Projet non trouvé: $projectPath"
          }
          Write-Host "::endgroup::"

          $modes = @(
              "Release 64-Bit",
              "Release 64-Bit O4 AVX2",
              "Release 32-Bit"
          )

          $globalFail = $false
          foreach ($mode in $modes) {
              Write-Host "::group::Compilation mode: $mode"
              & lazbuild --build-mode="$mode" --max-process-count=4 "$projectPath" 2>&1
              $exitCode = $LASTEXITCODE
              Write-Host "::endgroup::"
              if ($exitCode -ne 0) {
                  Write-Warning "Échec du mode '$mode' (code $exitCode) — on continue."
                  $globalFail = $true
              }
          }

          Write-Host "::group::Vérification des binaires générés"
          $binDir = Join-Path $workspace "Cheat Engine\bin"
          if (Test-Path $binDir) {
              Get-ChildItem -Path $binDir -Filter "*.exe" | ForEach-Object {
                  Write-Host "Binaire généré: $($_.Name) ($($_.Length) bytes)"
              }
          }
          Write-Host "::endgroup::"

          if ($globalFail) {
              $has64 = Test-Path (Join-Path $binDir "cheatengine-x86_64.exe")
              $has64Avx2 = Test-Path (Join-Path $binDir "cheatengine-x86_64-SSE4-AVX2.exe")
              if (-not ($has64 -or $has64Avx2)) {
                  throw "Aucun binaire 64-bit n'a été produit — build abandonné."
              }
              Write-Host "Build partiellement réussi — au moins un binaire 64-bit présent."
          }

      # ── Construire TOUS les sous-projets Lazarus ──
      - name: Build all Lazarus sub-projects (.lpi/.lpr)
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $ceDir = Join-Path $workspace "Cheat Engine"

          $subProjectDirs = @(
              "speedhack","luaclient","VEHDebug","Tutorial","betterControls",
              "plugin","launcher","windowsrepair","ceregreset","common",
              "winhook","xmplayer","sfx","release"
          )

          $lpiFiles = @()
          $lprFiles = @()
          foreach ($sub in $subProjectDirs) {
              $subPath = Join-Path $ceDir $sub
              if (Test-Path $subPath) {
                  $lpiFiles += Get-ChildItem -Path $subPath -Filter "*.lpi" -Recurse -ErrorAction SilentlyContinue
                  $lprFiles += Get-ChildItem -Path $subPath -Filter "*.lpr" -Recurse -ErrorAction SilentlyContinue
              }
          }

          foreach ($lpi in $lpiFiles) {
              Write-Host "::group::lazbuild $($lpi.Name)"
              & lazbuild --build-all --max-process-count=4 "$($lpi.FullName)" 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Warning "Échec $($lpi.Name) (code $LASTEXITCODE)" }
              Write-Host "::endgroup::"
          }
          foreach ($lpr in $lprFiles) {
              Write-Host "::group::lazbuild $($lpr.Name)"
              & lazbuild --max-process-count=4 "$($lpr.FullName)" 2>&1
              if ($LASTEXITCODE -ne 0) { Write-Warning "Échec $($lpr.Name) (code $LASTEXITCODE)" }
              Write-Host "::endgroup::"
          }
          Write-Host "Sous-projets Lazarus terminés."

      # ── Construire les sous-projets Visual Studio (.sln) ──
      - name: Build Visual Studio sub-projects (.sln)
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $slnFiles = Get-ChildItem -Path (Join-Path $workspace "Cheat Engine") -Filter "*.sln" -Recurse -ErrorAction SilentlyContinue
          Write-Host "::group::Solutions Visual Studio trouvées: $($slnFiles.Count)"
          $slnFiles | ForEach-Object { Write-Host "  SLN: $($_.FullName)" }
          Write-Host "::endgroup::"

          foreach ($sln in $slnFiles) {
              Write-Host "::group::msbuild $($sln.Name)"
              foreach ($platform in @("x86", "x64")) {
                  & msbuild "$($sln.FullName)" /nologo /verbosity:minimal /p:Configuration=Release /p:Platform="$platform" 2>&1
                  if ($LASTEXITCODE -ne 0) {
                      & msbuild "$($sln.FullName)" /nologo /verbosity:minimal /p:Configuration=Release 2>&1
                      if ($LASTEXITCODE -ne 0) { Write-Warning "Échec msbuild $($sln.Name)" }
                      break
                  }
              }
              Write-Host "::endgroup::"
          }

      # ── tcclib copies vers bin ──
      - name: Copy tcclib DLLs to bin
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $tcclibOut = Get-ChildItem -Path (Join-Path $workspace "Cheat Engine\tcclib") -Filter "*.dll" -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match "tcclib" }
          if ($tcclibOut) {
              $binDir = Join-Path $workspace "Cheat Engine\bin"
              foreach ($dll in $tcclibOut) {
                  Copy-Item $dll.FullName -Destination $binDir -Force -ErrorAction SilentlyContinue
                  Write-Host "Copié $($dll.Name) -> bin"
              }
          } else { Write-Host "Aucune DLL tcclib trouvée." }

      # ── Résumé final ──
      - name: List final bin folder
        shell: pwsh
        run: |
          $binDir = Join-Path $env:GITHUB_WORKSPACE "Cheat Engine\bin"
          Write-Host "::group::Contenu final de $binDir"
          if (Test-Path $binDir) {
              Get-ChildItem -Path $binDir -Recurse -File | Sort-Object FullName | ForEach-Object {
                  $rel = $_.FullName.Substring($binDir.Length + 1)
                  Write-Host ("  {0,-50} {1,12} bytes" -f $rel, $_.Length)
              }
          } else { Write-Warning "bin introuvable!" }
          Write-Host "::endgroup::"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-engine-win64-${{ inputs.ref || 'master' }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
