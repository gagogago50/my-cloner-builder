name: Secure Build Cheat Engine

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: cheat-engine/cheat-engine)"
        required: true
        default: "cheat-engine/cheat-engine"
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "master"
        type: string
      artifact_path:
        description: "Glob du binaire à uploader"
        required: true
        default: "Cheat Engine/bin/**"
        type: string
      lazarus_version:
        description: "Version de Lazarus (2.2.2 recommandé pour CE)"
        required: false
        default: "2.2.2"
        type: choice
        options:
          - "2.2.2"
          - "2.2.6"
          - "stable"

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Sequential Security Scans"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Create Gitleaks allowlist
        run: |
          cat > .gitleaks.toml << 'EOF'
          [extend]
          useDefault = true

          [allowlist]
          description = "Faux positifs connus - code source Cheat Engine tiers"
          paths = [
            "Cheat Engine/feces\\.pas",
            "Cheat Engine/frmluaengineunit\\.lfm"
          ]
          EOF

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml

      - name: Setup ClamAV
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav clamav-daemon
          sudo freshclam --quiet || true

      - name: Scan repository with ClamAV
        continue-on-error: true
        run: clamscan --recursive --infected --quiet . || true

      - name: Pattern scan
        continue-on-error: true
        run: |
          echo "Recherche de motifs sensibles (non bloquant)"
          grep -rniE "(password|secret|token|api_key)" --include="*.pas" --include="*.lfm" --include="*.lpi" --include="*.lpr" . || true

  build:
    name: "Build Windows AMD64"
    runs-on: windows-latest
    needs: security-scans
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          submodules: recursive

      # ── Setup MSBuild pour les sous-projets .sln (tcclib, DirectXMess, mono, dotnet, jvmti, dbkkernel) ──
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # ── Setup Lazarus avec version spécifique ──
      # CRITIQUE: Cheat Engine nécessite Lazarus 2.2.2, 2.2.6 ou 3.x
      # Les versions 4.x causent l'erreur "Cannot find laz_avl_Tree"
      - name: Setup Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: ${{ inputs.lazarus_version }}
          with-cache: true

      - name: Verify lazbuild and find install path
        shell: pwsh
        run: |
          # Vérifier que lazbuild est dans le PATH
          $lazbuild = Get-Command lazbuild -ErrorAction SilentlyContinue
          if (-not $lazbuild) {
              throw "lazbuild n'est pas dans le PATH"
          }
          Write-Host "lazbuild trouvé: $($lazbuild.Source)"

          # Répertoire d'installation de Lazarus
          $lazDir = Split-Path -Parent $lazbuild.Source
          Write-Host "Répertoire Lazarus: $lazDir"
          echo "LAZARUS_DIR=$lazDir" >> $env:GITHUB_ENV

          # Vérifier les versions
          & lazbuild --version
          fpc -iV

          # Localiser MSBuild et cl (compilateur C pour tcclib.sln)
          $msbuild = Get-Command msbuild -ErrorAction SilentlyContinue
          if ($msbuild) { Write-Host "msbuild trouvé: $($msbuild.Source)" } else { Write-Warning "msbuild NON trouvé" }

      # ── Enregistrer les packages personnalisés de Cheat Engine ──
      - name: Register and Build Cheat Engine Packages
        shell: pwsh
        run: |
          $lazarusDir = $env:LAZARUS_DIR
          $workspace = $env:GITHUB_WORKSPACE
          $ceDir = Join-Path $workspace "Cheat Engine"

          Write-Host "::group::Recherche des packages .lpk"
          $packages = Get-ChildItem -Path $ceDir -Filter "*.lpk" -Recurse | Sort-Object Name
          Write-Host "Packages trouvés: $($packages.Count)"
          $packages | ForEach-Object { Write-Host "  - $($_.Name)" }
          Write-Host "::endgroup::"

          # Ajouter les packages (dépendances d'abord)
          foreach ($pkg in $packages) {
              Write-Host "::group::Ajout du package: $($pkg.Name)"
              try {
                  & lazbuild --add-package "$($pkg.FullName)" 2>&1
                  if ($LASTEXITCODE -ne 0) {
                      Write-Warning "Erreur lors de l'ajout de $($pkg.Name), code: $LASTEXITCODE"
                  }
              } catch {
                  Write-Warning "Exception lors de l'ajout de $($pkg.Name): $_"
              }
              Write-Host "::endgroup::"
          }

          # Reconstruire la configuration Lazarus
          Write-Host "::group::Reconstruction de la configuration Lazarus"
          & lazbuild --build-ide= 2>&1 | Out-Null
          Write-Host "::endgroup::"

      # ── Construire Cheat Engine principal : modes 64-bit, 64-bit AVX2 et 32-bit ──
      # Le mode "Release 64-Bit O4 AVX2" produit cheatengine-x86_64-SSE4-AVX2.exe
      - name: Build Cheat Engine (all release modes)
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $projectPath = Join-Path $workspace "Cheat Engine\cheatengine.lpi"

          Write-Host "::group::Configuration du build"
          Write-Host "Projet: $projectPath"
          if (-not (Test-Path $projectPath)) {
              throw "Projet non trouvé: $projectPath"
          }
          Write-Host "::endgroup::"

          # Liste explicite des modes Release à compiler.
          # Les noms correspondent à ceux définis dans cheatengine.lpi (sensibles à la casse).
          $modes = @(
              "Release 64-Bit",
              "Release 64-Bit O4 AVX2",
              "Release 32-Bit"
          )

          $globalFail = $false
          foreach ($mode in $modes) {
              Write-Host "::group::Compilation mode: $mode"
              & lazbuild `
                --build-mode="$mode" `
                --max-process-count=4 `
                "$projectPath" 2>&1
              $exitCode = $LASTEXITCODE
              Write-Host "::endgroup::"
              if ($exitCode -ne 0) {
                  Write-Warning "Échec du mode '$mode' (code $exitCode) — on continue avec les autres modes."
                  $globalFail = $true
              }
          }

          Write-Host "::group::Vérification des binaires générés"
          $binDir = Join-Path $workspace "Cheat Engine\bin"
          if (Test-Path $binDir) {
              Get-ChildItem -Path $binDir -Filter "*.exe" | ForEach-Object {
                  Write-Host "Binaire généré: $($_.Name) ($($_.Length) bytes)"
              }
          } else {
              Write-Warning "Le dossier bin n'existe pas encore"
          }
          Write-Host "::endgroup::"

          # On ne faille pas ici: certains modes peuvent échouer selon la source/commit,
          # mais au moins un mode 64-bit doit réussir.
          if ($globalFail) {
              $has64 = Test-Path (Join-Path $binDir "cheatengine-x86_64.exe")
              $has64Avx2 = Test-Path (Join-Path $binDir "cheatengine-x86_64-SSE4-AVX2.exe")
              if (-not ($has64 -or $has64Avx2)) {
                  throw "Aucun binaire 64-bit n'a été produit — build abandonné."
              }
              Write-Host "Build partiellement réussi — au moins un binaire 64-bit présent."
          }

      # ── Construire TOUS les sous-projets Lazarus (.lpi/.lpr) ──
      # Stratégie inspirée de l'appveyor.yml officiel : compiler tous les .lpi récursivement.
      # Cela couvre: speedhack, luaclient, vehdebug, tutorial, betterControls, plugin (exemples), etc.
      - name: Build all Lazarus sub-projects (.lpi)
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $ceDir = Join-Path $workspace "Cheat Engine"

          # Liste blanche: on évite de recompiler le projet principal (déjà fait ci-dessus).
          # On cible les sous-dossiers connus contenant des .lpi secondaires.
          $subProjectDirs = @(
              "speedhack",
              "luaclient",
              "VEHDebug",
              "Tutorial",
              "betterControls",
              "plugin",
              "launcher",
              "windowsrepair",
              "ceregreset",
              "common",
              "winhook",
              "xmplayer",
              "sfx",
              "release"
          )

          $lpiFiles = @()
          foreach ($sub in $subProjectDirs) {
              $subPath = Join-Path $ceDir $sub
              if (Test-Path $subPath) {
                  $found = Get-ChildItem -Path $subPath -Filter "*.lpi" -Recurse -ErrorAction SilentlyContinue
                  if ($found) { $lpiFiles += $found }
              }
          }

          # Aussi: tous les .lpr (projets sans .lpi ou projets programme pur) des mêmes dossiers
          $lprFiles = @()
          foreach ($sub in $subProjectDirs) {
              $subPath = Join-Path $ceDir $sub
              if (Test-Path $subPath) {
                  $found = Get-ChildItem -Path $subPath -Filter "*.lpr" -Recurse -ErrorAction SilentlyContinue
                  if ($found) { $lprFiles += $found }
              }
          }

          Write-Host "::group::Sous-projets Lazarus (.lpi) trouvés: $($lpiFiles.Count)"
          $lpiFiles | ForEach-Object { Write-Host "  LPI: $($_.FullName)" }
          Write-Host "::endgroup::"

          Write-Host "::group::Sous-projets Lazarus (.lpr) trouvés: $($lprFiles.Count)"
          $lprFiles | ForEach-Object { Write-Host "  LPR: $($_.FullName)" }
          Write-Host "::endgroup::"

          # Compile chaque .lpi (build-all pour gérer les dépendances entre configurations 32/64)
          $failCount = 0
          foreach ($lpi in $lpiFiles) {
              Write-Host "::group::lazbuild $($lpi.Name)"
              & lazbuild --build-all --max-process-count=4 "$($lpi.FullName)" 2>&1
              if ($LASTEXITCODE -ne 0) {
                  Write-Warning "Échec $($lpi.Name) (code $LASTEXITCODE)"
                  $failCount++
              }
              Write-Host "::endgroup::"
          }

          # Compile chaque .lpr (programme)
          foreach ($lpr in $lprFiles) {
              Write-Host "::group::lazbuild $($lpr.Name)"
              & lazbuild --max-process-count=4 "$($lpr.FullName)" 2>&1
              if ($LASTEXITCODE -ne 0) {
                  Write-Warning "Échec $($lpr.Name) (code $LASTEXITCODE)"
                  $failCount++
              }
              Write-Host "::endgroup::"
          }

          Write-Host "Sous-projets Lazarus terminés. Échecs: $failCount/$($lpiFiles.Count + $lprFiles.Count)"
          # Non fatal — on continue vers les .sln

      # ── Construire les sous-projets Visual Studio (.sln) ──
      # tcclib, DirectXMess, DotNetCompiler, MonoDataCollector, DotNetDataCollector,
      # DotNetInvasiveDataCollector, CEJVMTI, DBKKernel
      - name: Build Visual Studio sub-projects (.sln)
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $binDir = Join-Path $workspace "Cheat Engine\bin"

          # Recherche récursive de tous les .sln dans Cheat Engine/
          $slnFiles = Get-ChildItem -Path (Join-Path $workspace "Cheat Engine") -Filter "*.sln" -Recurse -ErrorAction SilentlyContinue
          Write-Host "::group::Solutions Visual Studio trouvées: $($slnFiles.Count)"
          $slnFiles | ForEach-Object { Write-Host "  SLN: $($_.FullName)" }
          Write-Host "::endgroup::"

          $failCount = 0
          foreach ($sln in $slnFiles) {
              Write-Host "::group::msbuild $($sln.Name)"

              # Restaurer les packages NuGet si un packages.config ou .csproj existe nearby
              $nugetProj = Get-ChildItem -Path $sln.DirectoryName -Filter "*.csproj" -ErrorAction SilentlyContinue | Select-Object -First 1
              if (Test-Path (Join-Path $workspace '.nuget')) {
                  & nuget restore "$($sln.FullName)" 2>&1 | Out-Null
              }

              # Build en Release pour x86 ET x64 (多位 des .sln CE gèrent Platform=Win32|Win64)
              foreach ($platform in @("x86", "x64")) {
                  & msbuild "$($sln.FullName)" `
                    /nologo /verbosity:minimal `
                    /p:Configuration=Release `
                    /p:Platform="$platform" 2>&1
                  if ($LASTEXITCODE -ne 0) {
                      # Retry sans Platform (certains sln n'acceptent pas x86/x64)
                      & msbuild "$($sln.FullName)" `
                        /nologo /verbosity:minimal `
                        /p:Configuration=Release 2>&1
                      if ($LASTEXITCODE -ne 0) {
                          Write-Warning "Échec msbuild $($sln.Name) [$platform] (code $LASTEXITCODE)"
                          $failCount++
                      }
                  }
              }
              Write-Host "::endgroup::"
          }

          Write-Host "Solutions VS terminées. Échecs: $failCount"

      # ── tcclib spécial: configurations 32-32, 64-32, 64-64 ──
      # Le README précise 3 configs distinctes; le step précédent couvre x86+x64 Release,
      # mais certaines configurations de projet tcclib utilisent des noms custom.
      - name: Build tcclib special configurations
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $tcclibDir = Join-Path $workspace "Cheat Engine\tcclib"
          if (-not (Test-Path $tcclibDir)) {
              Write-Host "Dossier tcclib introuvable, recherche récursive du .sln..."
              $tcclibSln = Get-ChildItem -Path (Join-Path $workspace "Cheat Engine") -Filter "tcclib*.sln" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($tcclibSln) { $tcclibDir = $tcclibSln.DirectoryName; $tcclibSlnPath = $tcclibSln.FullName }
              else { Write-Host "Aucun tcclib.sln trouvé — skip"; return }
          } else {
              $tcclibSln = Get-ChildItem -Path $tcclibDir -Filter "*.sln" -ErrorAction SilentlyContinue | Select-Record -First 1 2>$null
              # fallback robuste
              $tcclibSln = Get-ChildItem -Path $tcclibDir -Filter "tcclib*.sln" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($tcclibSln) { $tcclibSlnPath = $tcclibSln.FullName } else { Write-Host "Aucun .sln tcclib — skip"; return }
          }

          Write-Host "::group::tcclib: msbuild $tcclibSlnPath"
          # Lister les configurations disponibles dans la solution
          & msbuild "$tcclibSlnPath" /nologo /v:minimal /t:Build /p:Configuration=Release 2>&1
          Write-Host "::endgroup::"

          # Copier les dll tcclib générées vers bin si trouvé
          $tcclibOut = Get-ChildItem -Path (Split-Path $tcclibSlnPath -Parent) -Filter "*.dll" -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match "tcclib" }
          if ($tcclibOut) {
              $binDir = Join-Path $workspace "Cheat Engine\bin"
              foreach ($dll in $tcclibOut) {
                  Copy-Item $dll.FullName -Destination $binDir -Force -ErrorAction SilentlyContinue
                  Write-Host "Copié $($dll.Name) -> bin"
              }
          }

      # ── Résumé final: lister tout le contenu de bin/ ──
      - name: List final bin folder
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $binDir = Join-Path $workspace "Cheat Engine\bin"
          Write-Host "::group::Contenu final de $binDir"
          if (Test-Path $binDir) {
              Get-ChildItem -Path $binDir -Recurse -File | Sort-Object FullName | ForEach-Object {
                  $rel = $_.FullName.Substring($binDir.Length + 1)
                  Write-Host ("  {0,-50} {1,12} bytes" -f $rel, $_.Length)
              }
          } else {
              Write-Warning "bin introuvable!"
          }
          Write-Host "::endgroup::"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheat-engine-win64-${{ inputs.ref || 'master' }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
