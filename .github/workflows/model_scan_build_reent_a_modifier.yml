      # Exemple 2 : Pour un projet Bun (comme MiMo-Code)
      # - name: Setup Bun
      #   uses: oven-sh/setup-bun@v2
      # - name: Install and Build (Bun)
      #   run: |
      #     bun install
      #     bun run build

      # Exemple 3 : Pour un projet .NET (Windows natif)
      # - name: Setup .NET
      #   uses: actions/setup-dotnet@v4
