name: Secure Pre-Build Gatekeeper (Template)

on:
  workflow_dispatch: # Déclenchement UNIQUEMENT manuel depuis l'interface GitHub

jobs:
  # ÉTAPE 1 : Les vérifications de sécurité fondamentales
  security-verification:
    name: Integrity & Security Scan
    runs-on: ubuntu-latest

    steps:
      # Récupère le code source du dépôt actuel (là où est installé le workflow)
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Détection des binaires pré-compilés interdits (Anti-Malware)
      - name: Check for Pre-compiled Binaries (Anti-Malware Gate)
        run: |
          echo "Recherche de fichiers binaires suspects compilés à l'avance..."
          
          # Liste des extensions interdites (Exécutables et librairies)
          SUSPECT_EXTENSIONS="exe dll bin msi sys so dylib bat cmd cpl scr"
          FOUND_BINARIES=""
          
          for ext in $SUSPECT_EXTENSIONS; do
            # Recherche insensible à la casse
            FILES=$(find . -type f -iname "*.$ext" -not -path "*/.git/*" -not -path "*/node_modules/*")
            if [ ! -z "$FILES" ]; then
              echo "⚠️ ALERTE : Fichier(s) .$ext détecté(s) :"
              echo "$FILES"
              FOUND_BINARIES="true"
            fi
          done
          
          if [ "$FOUND_BINARIES" = "true" ]; then
            echo "❌ ERREUR CRITIQUE : Le dépôt contient des fichiers binaires pré-compilés."
            echo "Par mesure de sécurité, le build est AVORTÉ."
            exit 1
          else
            echo "✅ Aucun binaire pré-compilé suspect trouvé dans le code source."
          fi

      # Détection des attaques de Supply Chain (Socket)
      - name: Scan Dependencies for Malware & Obfuscation (Socket)
        uses: SocketDev/action@v1
        with:
          socket-token: ${{ secrets.SOCKET_SECURITY_API_KEY }} 
          mode: 'firewall' # Utilisation de 'firewall' (requis pour le déclenchement manuel)

      # Détection des vulnérabilités logiques et secrets (Semgrep OSS)
      - name: Scan Source Code Logic (Semgrep OSS)
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/security-audit p/secrets"
          auditOnInvalidConfig: true

  # ÉTAPE 2 : Le build proprement dit (Ne se lance QUE si l'Étape 1 réussit)
  build-application:
    name: Compile & Build Project
    needs: security-verification
    # REMPLACEZ 'ubuntu-latest' par 'windows-latest' ou 'macos-latest' selon vos besoins de compilation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # CONFIGURATION DE VOTRE ÉTAPE DE COMPILATION (Exemples à adapter)
      # -------------------------------------------------------------------------
      
      # Exemple 1 : Pour un projet Node.js
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
