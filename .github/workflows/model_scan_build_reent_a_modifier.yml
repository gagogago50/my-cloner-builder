name: Secure Build Any Project (Template)

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "owner/repo (ex: XiaomiMiMo/MiMo-Code)"
        required: true
        type: string
      ref:
        description: "branch / tag / sha"
        required: false
        default: "main"
        type: string
      build_command:
        description: "Commande de build (ex: bun run build ou npm run build)"
        required: true
        type: string
      artifact_path:
        description: "Glob du binaire à uploader (ex: dist/**/*.exe)"
        required: true
        type: string
      runs_on:
        description: "Runner"
        required: false
        default: "windows-latest"
        type: choice
        options:
          - windows-latest
          - ubuntu-latest
          - macos-latest
      node_or_bun:
        description: "Runtime"
        required: false
        default: "bun"
        type: choice
        options:
          - bun
          - node
          - none

permissions:
  contents: read
  security-events: write

jobs:
  security-scans:
    name: "Security Scans (parallel)"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scan: [binaries, clamav, gitleaks, socket, patterns]
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
          fetch-depth: ${{ matrix.scan == 'gitleaks' && 0 || 1 }}

      # ... (tu peux copier-coller les étapes de scan du workflow précédent
      #      et les conditionner avec if: matrix.scan == 'xxx')

  build:
    name: "Build ${{ inputs.runs_on }}"
    runs-on: ${{ inputs.runs_on }}
    needs: security-scans
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        if: inputs.node_or_bun == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        if: inputs.node_or_bun == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install & Build
        run: |
          if [ "${{ inputs.node_or_bun }}" = "bun" ]; then
            bun install
          elif [ "${{ inputs.node_or_bun }}" = "node" ]; then
            npm ci || npm install
          fi
          ${{ inputs.build_command }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.runs_on }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: 14
