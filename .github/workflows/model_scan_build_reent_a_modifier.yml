name: Secure Pre-Build Gatekeeper

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'interface GitHub

jobs:
  # ÉTAPE 1 : Les vérifications de sécurité fondamentales
  security-verification:
    name: Integrity & Security Scan
    runs-on: ubuntu-latest

    steps:
      # Récupération du code source complet
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Détection des binaires pré-compilés interdits
      - name: Check for Pre-compiled Binaries (Anti-Malware Gate)
        run: |
          echo "Recherche de fichiers binaires suspects compilés à l'avance..."
          
          # Liste des extensions interdites (Exécutables Windows, Linux, Mac et librairies)
          # Vous pouvez adapter cette liste selon vos besoins spécifiques
          SUSPECT_EXTENSIONS="exe dll bin msi sys so dylib bat cmd cpl scr"
          
          FOUND_BINARIES=""
          
          for ext in $SUSPECT_EXTENSIONS; do
            # Recherche insensible à la casse
            FILES=$(find . -type f -iname "*.$ext" -not -path "*/.git/*" -not -path "*/node_modules/*")
            if [ ! -z "$FILES" ]; then
              echo "⚠️ ALERTE : Fichier(s) .$ext détecté(s) :"
              echo "$FILES"
              FOUND_BINARIES="true"
            fi
          done
          
          if [ "$FOUND_BINARIES" = "true" ]; then
            echo "❌ ERREUR CRITIQUE : Le dépôt contient des fichiers binaires pré-compilés."
            echo "Par mesure de sécurité contre les malwares et les backdoors masquées, le build est AVORTÉ."
            exit 1
          else
            echo "✅ Aucun binaire pré-compilé suspect trouvé dans le code source."
          fi

      # Détection des attaques de Supply Chain (Vol de données via les dépendances externes)
      # Note : Fonctionne de manière autonome, mais optimisé si vous liez l'application gratuite Socket à votre GitHub.
      - name: Scan Dependencies for Malware & Obfuscation (Socket)
        uses: SocketDev/action@v1
        with:
          # Si vous n'avez pas de clé API, Socket effectue tout de même un scan standard
          socket-token: ${{ secrets.SOCKET_SECURITY_API_KEY }} 

      # Détection des vulnérabilités logiques et patterns malveillants dans votre code
      - name: Scan Source Code Logic (Semgrep OSS)
        uses: semgrep/semgrep-action@v1
        with:
          config: "p/security-audit p/secrets"
          auditOnInvalidConfig: true

  # ÉTAPE 2 : Le build proprement dit (Ne se lance QUE si l'Étape 1 réussit à 100%)
  build-application:
    name: Compile & Build Project
    needs: security-verification # Garantit le blocage si un danger est détecté ci-dessus
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # AJOUTEZ ICI LA CONFIGURATION DE VOTRE LANGAGE (Exemples ci-dessous)
      # Remplacez ou activez la section qui correspond à votre type de projet :
      # -------------------------------------------------------------------------
      
      # Exemple pour un projet Node.js / JavaScript / TypeScript
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - name: Install and Build (Node)
      #   run: |
      #     npm ci
      #     npm run build --if-present

      # Exemple pour un projet .NET / C# (Windows natif)
      # - name: Setup .NET
      #   uses: actions/setup-dotnet@v4
      #   with:
      #     dotnet-version: '8.0.x'
      # - name: Build (.NET)
      #   run: dotnet build --configuration Release

      # Commande générique de démonstration (à remplacer par votre commande réelle)
      - name: Run Build Command
        run: |
          echo "Le code source a été validé et nettoyé par la barrière de sécurité."
          echo "Lancement sécurisé du processus de compilation..."
